# CI quality gate (AI-IMP-008; desktop e2e added by AI-IMP-050).
#
# Runs `pnpm check:ci` (workspace build, workspace tests, lint, spike
# typecheck), then the desktop Playwright e2e suite under xvfb —
# Electron needs a display server even with EW_TEST_HIDDEN_WINDOWS.
# Perf benchmarks are excluded on CI by playwright.config (they
# refuse software GL by design — EPIC-001 lesson — and runners have
# no GPU); perf remains a local hardware gate.
#
# Electron install note: `pnpm install` runs electron's postinstall
# (install.js) to download/extract the platform binary, allowed via
# `allowBuilds.electron` in pnpm-workspace.yaml.

name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is taken from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # spike/ is npm-managed and outside the pnpm workspace. Its gate is a
      # pure typecheck (spike's own tsc), so postinstall scripts (esbuild,
      # playwright) are skipped — no binaries needed.
      - name: Install spike dependencies (typecheck only)
        run: npm ci --prefix spike --ignore-scripts

      - name: Quality gates (build, tests minus desktop e2e, lint, spike typecheck)
        run: pnpm check:ci

      # pnpm's postinstall for electron proved unreliable on the
      # runner (install finished in 5s with no binary; every launch
      # then failed). `pnpm rebuild` re-runs the build script with
      # the package's deps properly linked.
      - name: Ensure Electron binary
        run: |
          pnpm --dir apps/desktop rebuild electron
          ls apps/desktop/node_modules/electron/ | head
          ls apps/desktop/node_modules/electron/dist/ | head || true
          test -x apps/desktop/node_modules/electron/dist/electron

      - name: Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libgtk-3-0 libgbm1 libasound2t64 libxss1 xvfb

      - name: Desktop e2e (minus perf)
        working-directory: apps/desktop
        run: xvfb-run --auto-servernum npx playwright test
