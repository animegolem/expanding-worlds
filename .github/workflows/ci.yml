# CI quality gate (AI-IMP-008; desktop e2e added by AI-IMP-050).
#
# Runs `pnpm check:ci` (workspace build, workspace tests, lint, spike
# typecheck), then the desktop Playwright e2e suite under xvfb —
# Electron needs a display server even with EW_TEST_HIDDEN_WINDOWS.
# Perf benchmarks are excluded on CI by playwright.config (they
# refuse software GL by design — EPIC-001 lesson — and runners have
# no GPU); perf remains a local hardware gate.
#
# Electron install note: `pnpm install` runs electron's postinstall
# (install.js) to download/extract the platform binary, allowed via
# `allowBuilds.electron` in pnpm-workspace.yaml.

name: CI

# AI-IMP-268 runtime rebalance: doc-only pushes (RAG/ tickets,
# design queue, logs, changelogs — about half of all pushes) skip
# the workflow entirely; a push superseding an in-flight run
# cancels it (cancelled ≠ red); the e2e suite is sharded 4-way
# below. Mixed doc+code pushes still run everything.
on:
  push:
    paths-ignore:
      - 'RAG/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'RAG/**'
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is taken from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # spike/ is npm-managed and outside the pnpm workspace. Its gate is a
      # pure typecheck (spike's own tsc), so postinstall scripts (esbuild,
      # playwright) are skipped — no binaries needed.
      - name: Install spike dependencies (typecheck only)
        run: npm ci --prefix spike --ignore-scripts

      - name: Quality gates (build, tests minus desktop e2e, lint, spike typecheck)
        run: pnpm check:ci

  # AI-IMP-268: the full desktop e2e suite was one single-worker
  # step inside `check` — 44 of the 45 minutes every push cost.
  # Four Playwright shards quarter the wall time; fail-fast off so
  # one red shard never hides the others' results. Combined test
  # count across shards equals the old single job.
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # vitest and the utility bundle resolve workspace deps through
      # dist — e2e needs the packages built, but not lint/units.
      - name: Build workspace
        run: pnpm -r build

      # pnpm's postinstall for electron proved unreliable on the
      # runner (install finished in 5s with no binary; every launch
      # then failed). install.js only fetches; we extract ourselves
      # (extract-zip exits clean after one entry — the husk).
      - name: Ensure Electron binary
        working-directory: apps/desktop
        run: |
          rm -rf ~/.cache/electron node_modules/electron/dist node_modules/electron/path.txt
          node node_modules/electron/install.js 2>&1 || true
          zip_path=$(ls ~/.cache/electron/*/electron-v*-linux-x64.zip | head -1)
          ls -l "$zip_path"
          unzip -l "$zip_path" | tail -3
          rm -rf node_modules/electron/dist
          mkdir -p node_modules/electron/dist
          unzip -oq "$zip_path" -d node_modules/electron/dist
          printf 'electron' > node_modules/electron/path.txt
          ls node_modules/electron/dist/ | head -5
          test -x node_modules/electron/dist/electron

      - name: Electron runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libgtk-3-0 libgbm1 libasound2t64 libxss1 xvfb

      - name: Desktop e2e shard ${{ matrix.shard }}/4 (minus perf)
        working-directory: apps/desktop
        run: xvfb-run --auto-servernum npx playwright test --shard=${{ matrix.shard }}/4 --trace on-first-retry

      # Failure evidence: error-context page snapshots + traces are
      # written locally but were never uploaded, leaving red shards
      # diagnosable only by guesswork (dock-wave round 3 lesson).
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shard-${{ matrix.shard }}-failure
          path: apps/desktop/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # AI-IMP-242: the first tester lives on Windows daily; until this job
  # the whole test estate ran macOS-local + Linux-CI. Units + the
  # AI-IMP-226 multi-process lock probe (file locking is exactly where
  # Windows semantics differ: O_EXCL, mkdir, unlink-while-open) + a
  # smoke e2e. Full e2e stays Linux until this leg proves its flake
  # profile.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Package units (includes the lock probe)
        # Timeout policy lives in packages/persistence/vitest.config.ts
        # (CI-conditional): the pnpm '--' pass-through proved unreliable
        # through pwsh (AI-IMP-249 round 6 still timed out at the 5s
        # default), so the config owns it where quoting can't eat it.
        run: pnpm --filter='./packages/*' test

      - name: Desktop units
        working-directory: apps/desktop
        run: npx vitest run

      # Same disease the Linux job treats in its "Ensure Electron
      # binary" step: pnpm's electron postinstall "succeeds" while
      # extracting a single entry, leaving a husk dist. Run
      # 29082725843 — the first execution of the smoke step on this
      # leg — proved the husk is not macOS/Linux-specific: all 7
      # shell specs died at electron.launch. Use install.js only to
      # fetch the archive, extract it ourselves, write path.txt with
      # no trailing newline (the AI-IMP-111 landmines).
      - name: Ensure Electron binary
        working-directory: apps/desktop
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA/electron/Cache", node_modules/electron/dist, node_modules/electron/path.txt -ErrorAction Ignore
          node node_modules/electron/install.js
          if ($LASTEXITCODE -ne 0) { Write-Host "install.js exited $LASTEXITCODE (ignored; we extract ourselves)" }
          $zip = Get-ChildItem "$env:LOCALAPPDATA/electron/Cache" -Recurse -Filter 'electron-v*-win32-x64.zip' | Select-Object -First 1
          if (-not $zip) { throw 'electron zip not found in cache after install.js' }
          Write-Host "extracting $($zip.FullName) ($([math]::Round($zip.Length/1MB))MB)"
          Remove-Item -Recurse -Force node_modules/electron/dist -ErrorAction Ignore
          Expand-Archive -Path $zip.FullName -DestinationPath node_modules/electron/dist -Force
          Set-Content -Path node_modules/electron/path.txt -Value 'electron.exe' -NoNewline
          if (-not (Test-Path node_modules/electron/dist/electron.exe)) { throw 'electron.exe missing after extraction' }

      # Smoke only: shell launch + IPC round-trip. Windows runners
      # launch Electron GUIs natively (no xvfb). If this step proves
      # flaky it gets a loud skip with a linked ticket — never a
      # silent pass.
      - name: Desktop smoke e2e (shell)
        working-directory: apps/desktop
        run: npx playwright test e2e/shell.spec.ts
