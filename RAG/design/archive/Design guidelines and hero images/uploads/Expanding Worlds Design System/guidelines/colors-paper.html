<!-- @dsCard group="Colors" viewport="700x150" name="Paper palette" subtitle="Notes stay light paper, even in dark theme" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--ew-link-bound)}a:hover{color:var(--ew-accent)}</style></head>
<body style="margin:0;background:var(--ew-surface-solid);padding:14px;display:flex;gap:10px;font-family:var(--ew-font-ui)">
  <div style="flex:1.6;border-radius:9px;border:1px solid var(--ew-paper-border-strong);background:var(--ew-paper-surface);box-shadow:var(--ew-panel-shadow);padding:10px 12px">
    <div style="font-size:13px;font-weight:600;color:var(--ew-paper-text-heading)">Goblin chief</div>
    <div style="margin-top:6px;font-size:12px;line-height:1.55;color:var(--ew-paper-text)">Chieftain of the warren beneath the <span style="color:var(--ew-link-bound);border-bottom:1px solid var(--ew-link-bound-decoration)">Northern Reach</span>. See <span style="color:var(--ew-link-unresolved);border-bottom:1px solid var(--ew-link-unresolved-decoration)">shield-oath</span>.</div>
    <div style="margin-top:6px;font-size:11px;color:var(--ew-paper-text-muted)">paper-surface · paper-page · paper-text</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:6px">
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-info-surface);border:1px solid var(--ew-paper-info-border);color:var(--ew-paper-info-text);font-size:11px;padding:6px 10px">info</div>
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-trash-surface);border:1px solid var(--ew-paper-trash-border);color:var(--ew-paper-trash-text);font-size:11px;padding:6px 10px">in trash</div>
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-broken-surface);border:1px solid var(--ew-paper-broken-border);color:var(--ew-paper-broken-text);font-size:11px;padding:6px 10px">broken</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:6px">
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-chip-surface);border:1px solid var(--ew-paper-chip-border);color:var(--ew-paper-chip-text);font-size:11px;padding:6px 10px;font-family:var(--ew-font-mono)">#tag chip</div>
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-page);border:1px solid var(--ew-paper-border);color:var(--ew-paper-text-subtle);font-size:11px;padding:6px 10px">page</div>
    <div style="flex:1;border-radius:7px;background:var(--ew-paper-hover);border:1px solid var(--ew-paper-border-subtle);color:var(--ew-paper-text-muted);font-size:11px;padding:6px 10px">hover</div>
  </div>
</body></html>
