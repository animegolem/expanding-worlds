<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--ew-accent)}a:hover{color:var(--ew-accent-soft)}</style></head>

  <div style="flex:1;text-align:center"><div style="width:26px;height:26px;border-radius:50%;background:var(--ew-node-dot-gold);margin:0 auto 6px"></div><div style="color:var(--ew-text-muted);font-size:11px">gold</div></div>

  <div style="flex:1;text-align:center"><div style="width:26px;height:26px;border-radius:50%;background:var(--ew-node-dot-purple);margin:0 auto 6px"></div><div style="color:var(--ew-text-muted);font-size:11px">purple</div></div>
  <div style="flex:1;text-align:center"><div style="width:26px;height:26px;border-radius:50%;background:var(--ew-node-dot-pink);margin:0 auto 6px"></div><div style="color:var(--ew-text-muted);font-size:11px">pink</div></div>
