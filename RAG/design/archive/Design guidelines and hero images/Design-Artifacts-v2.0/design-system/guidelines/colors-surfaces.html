<!-- @dsCard group="Colors" viewport="700x150" name="Chrome surfaces (dark)" subtitle="Layered translucent near-black surfaces" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--ew-accent)}a:hover{color:var(--ew-accent-soft)}</style></head>
<body style="margin:0;background:var(--ew-surface-solid);padding:14px;display:flex;gap:8px;font-family:var(--ew-font-ui)">
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface-solid);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">surface-solid</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">#17191d</div></div>
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">surface</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">.92</div></div>
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface-raised);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">raised</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">#23262c</div></div>
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface-hover);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">hover</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">#2a2e35</div></div>
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface-menu);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">menu</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">.95</div></div>
  <div style="flex:1;border-radius:7px;border:1px solid var(--ew-border);background:var(--ew-surface-overlay);padding:10px 12px"><div style="color:var(--ew-text);font-size:12px">overlay</div><div style="color:var(--ew-text-subtle);font-size:11px;font-family:var(--ew-font-mono)">.97</div></div>
</body></html>
