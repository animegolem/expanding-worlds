<!-- @dsCard group="Chrome" viewport="700x190" name="Tooltip — the five legal shapes" subtitle="One chip app-wide, ~500ms, clamp-and-flip; nothing else is a tooltip" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--ew-accent)}a:hover{color:var(--ew-accent-soft)}</style></head>
<body style="margin:0;background:var(--ew-surface-solid);padding:14px 18px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:center;gap:10px"><span style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);width:90px">name+shortcut</span><span style="display:inline-flex;align-items:center;gap:7px;padding:4px 9px;border-radius:6px;background:var(--ew-tooltip-scrim);border:1px solid var(--ew-chip-border);font-size:11px;color:var(--ew-text)">Bookmark this board <span style="font-family:ui-monospace,Menlo,monospace;color:var(--ew-text-muted);background:var(--ew-control-tint);border-radius:3px;padding:0 5px">⌘D</span></span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);width:90px">name only</span><span style="display:inline-flex;padding:4px 9px;border-radius:6px;background:var(--ew-tooltip-scrim);border:1px solid var(--ew-chip-border);font-size:11px;color:var(--ew-text)">Open as source</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);width:90px">disabled+why</span><span style="display:inline-flex;align-items:center;gap:7px;padding:4px 9px;border-radius:6px;background:var(--ew-tooltip-scrim);border:1px solid var(--ew-chip-border);font-size:11px;color:var(--ew-text-subtle)">Redo — nothing to redo <span style="font-family:ui-monospace,Menlo,monospace;background:var(--ew-control-tint);border-radius:3px;padding:0 5px;opacity:.7">⇧⌘Z</span></span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);width:90px">state+exit</span><span style="display:inline-flex;align-items:center;gap:7px;padding:4px 9px;border-radius:6px;background:var(--ew-tooltip-scrim);border:1px solid var(--ew-chip-border);font-size:11px;color:var(--ew-text)">Lens on <span style="font-family:ui-monospace,Menlo,monospace;color:var(--ew-text-muted);background:var(--ew-control-tint);border-radius:3px;padding:0 5px">esc</span></span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);width:90px">not yet</span><span style="display:inline-flex;padding:4px 9px;border-radius:6px;background:var(--ew-tooltip-scrim);border:1px solid var(--ew-chip-border);font-size:11px;color:var(--ew-text-subtle)">Graph — coming soon</span></div>
  <div style="font:9px ui-monospace,Menlo,monospace;color:var(--ew-text-subtle);border-top:1px solid var(--ew-border);padding-top:7px">never: prose beyond a line · interactive content · images · a second style · tooltips on tooltips — menus print shortcuts in rows instead</div>
</body></html>
