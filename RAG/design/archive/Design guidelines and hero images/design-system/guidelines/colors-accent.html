<!-- @dsCard group="Colors" viewport="700x150" name="Accent + semantic" subtitle="One blue accent; desaturated danger/warn" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>a{color:var(--ew-accent)}a:hover{color:var(--ew-accent-soft)}</style></head>
<body style="margin:0;background:var(--ew-surface-solid);padding:14px;display:flex;gap:8px;font-family:var(--ew-font-ui)">
  <div style="flex:1.4;border-radius:7px;background:var(--ew-accent);padding:10px 12px;color:var(--ew-on-accent)"><div style="font-size:12px;font-weight:600">accent</div><div style="font-size:11px;font-family:var(--ew-font-mono)">#4a9df0</div></div>
  <div style="flex:1;border-radius:7px;background:var(--ew-accent-soft);padding:10px 12px;color:var(--ew-on-accent)"><div style="font-size:12px">accent-soft</div><div style="font-size:11px;font-family:var(--ew-font-mono)">#8ec2f5</div></div>
  <div style="flex:1;border-radius:7px;background:var(--ew-danger);padding:10px 12px;color:var(--ew-on-danger)"><div style="font-size:12px">danger</div><div style="font-size:11px;font-family:var(--ew-font-mono)">#b3403a</div></div>
  <div style="flex:1;border-radius:7px;background:var(--ew-danger-surface-solid);border:1px solid var(--ew-danger-border);padding:10px 12px;color:var(--ew-danger-text)"><div style="font-size:12px">danger-surface</div><div style="font-size:11px;font-family:var(--ew-font-mono)">#3b1f1f</div></div>
  <div style="flex:1;border-radius:7px;background:var(--ew-surface-raised);border:1px solid var(--ew-warn-border);padding:10px 12px;color:var(--ew-warn)"><div style="font-size:12px">⚠ warn</div><div style="font-size:11px;font-family:var(--ew-font-mono)">#e6b34a</div></div>
</body></html>
