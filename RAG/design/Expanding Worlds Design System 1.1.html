  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Expanding Worlds — design kit<\u002Ftitle>\n<style>:root {\n  color-scheme: dark;\n\n  --ew-surface: rgba(23, 25, 29, 0.92);\n  --ew-surface-solid: #17191d;\n  --ew-surface-raised: #23262c;\n  --ew-surface-hover: #2a2e35;\n  --ew-surface-control-hover: #3a3f47;\n  --ew-surface-menu: rgba(23, 25, 29, 0.95);\n  --ew-surface-rail: rgba(23, 25, 29, 0.88);\n  --ew-surface-subtle: rgba(23, 25, 29, 0.82);\n  --ew-surface-overlay: rgba(23, 25, 29, 0.97);\n  --ew-surface-modal: #22262c;\n  --ew-surface-input: #17191d;\n  --ew-border: #2e3138;\n  --ew-border-strong: #3a3e46;\n  --ew-border-panel: #3a4048;\n  --ew-border-control: #4a4f57;\n  --ew-border-accent-subtle: #3a4a5e;\n  --ew-text: #dde3ea;\n  --ew-text-soft: #c8cfd8;\n  --ew-text-muted: #9aa3ad;\n  --ew-text-subtle: #79808a;\n  --ew-text-dialog: #dddddd;\n  --ew-accent: #4a9df0;\n  --ew-accent-soft: #8ec2f5;\n  /* §4.9 frame region (AI-IMP-127): furniture, not art — a low-alpha\n     fill wash + a subtle border, drawn by the canvas engine. Hex only\n     (the engine parses these to Pixi colors; no rgba). */\n  --ew-frame-fill: #20242b;\n  --ew-frame-border: #3a3e46;\n  --ew-frame-label: #79808a;\n  --ew-on-accent: #10131a;\n  --ew-danger: #b3403a;\n  --ew-on-danger: #ffffff;\n  --ew-danger-surface: rgba(59, 31, 31, 0.95);\n  --ew-danger-surface-solid: #3b1f1f;\n  --ew-danger-text: #f3c9c9;\n  --ew-danger-border: #7c3a3a;\n  --ew-danger-muted: #e8a49f;\n  --ew-success-border: #2e5c3a;\n  --ew-warn: #e6b34a;\n  --ew-warn-border: #6b5426;\n  --ew-warn-muted: #a7844e;\n  --ew-warn-muted-border: #4d4231;\n  --ew-scrim: rgba(12, 13, 16, 0.55);\n  --ew-dialog-scrim: rgba(0, 0, 0, 0.25);\n  --ew-chip-scrim: rgba(23, 25, 29, 0.7);\n  --ew-chip-text: #dde3ea;\n  --ew-chip-border: #3a3e46;\n  --ew-art-chip-scrim: rgba(16, 19, 26, 0.72);\n  --ew-art-chip-scrim-soft: rgba(16, 19, 26, 0.35);\n  --ew-tooltip-scrim: rgba(16, 19, 26, 0.95);\n  --ew-control-tint: rgba(255, 255, 255, 0.08);\n  --ew-shadow: rgba(8, 10, 14, 0.35);\n  --ew-dialog-shadow: rgba(0, 0, 0, 0.25);\n  --ew-menu-shadow: rgba(0, 0, 0, 0.4);\n  --ew-accent-halo: rgba(74, 157, 240, 0.85);\n  --ew-accent-halo-shadow: rgba(74, 157, 240, 0.45);\n  --ew-focus-ring: rgba(74, 157, 240, 0.8);\n  --ew-focus-ring-fade: rgba(74, 157, 240, 0);\n  --ew-warn-pulse: rgba(230, 179, 74, 0.7);\n  --ew-warn-pulse-fade: rgba(230, 179, 74, 0);\n\n  /* Rotate-zone cursor (AI-IMP-031): CSS has no native rotate\n     cursor, so the glyph is an inline SVG — white over a black halo\n     so it reads over any art at any theme (a cursor bitmap, not\n     themed chrome). Crosshair is the fallback. */\n  --ew-cursor-rotate: url(\"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><path d='M10 4a6 6 0 1 1-6 6' fill='none' stroke='%23000' stroke-width='4.5' stroke-linecap='round'/><path d='M10 4a6 6 0 1 1-6 6' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><path d='M4 5 L1.5 10.5 L6.5 10.5 Z' fill='%23fff' stroke='%23000' stroke-width='1'/><\u002Fsvg>\") 10 10, crosshair; /* @kind other */\n\n  --ew-body-text: #222222;\n  --ew-paper-surface: #fafafa;\n  --ew-paper-page: #ffffff;\n  --ew-paper-border: #dddddd;\n  --ew-paper-border-subtle: #eeeeee;\n  --ew-paper-border-strong: #c9ced6;\n  --ew-paper-border-focus: #cccccc;\n  --ew-paper-pinned-border: #9db7d3;\n  --ew-paper-text: #333333;\n  --ew-paper-text-strong: #222222;\n  --ew-paper-text-heading: #444444;\n  --ew-paper-text-muted: #888888;\n  --ew-paper-text-subtle: #666666;\n  --ew-paper-text-soft: #999999;\n  --ew-paper-hover: #eeeeee;\n  --ew-paper-info-surface: #dce9f7;\n  --ew-paper-info-panel: #eef3f9;\n  --ew-paper-info-text: #33628f;\n  --ew-paper-info-border: #b9c6d6;\n  --ew-paper-danger-surface: #fbeaea;\n  --ew-paper-danger-text: #8c2f2f;\n  --ew-paper-tail: #7f8898;\n  --ew-paper-chip-surface: #eef1f5;\n  --ew-paper-chip-border: #d3d9e1;\n  --ew-paper-chip-text: #555577;\n  --ew-paper-dirty: #cc9900;\n  --ew-paper-trash-surface: #f3ead3;\n  --ew-paper-trash-border: #d9c68a;\n  --ew-paper-trash-text: #7a5f14;\n  --ew-paper-broken-surface: #f7e4e2;\n  --ew-paper-broken-border: #d9a09a;\n  --ew-paper-broken-text: #7c2d27;\n  --ew-paper-broken-muted: #9a5c56;\n\n  --ew-link-bound: #2563b0;\n  --ew-link-bound-decoration: #2563b080;\n  --ew-link-muted: #6b7684;\n  --ew-link-unresolved: #7c4dbe;\n  --ew-link-unresolved-decoration: #7c4dbe80;\n  --ew-link-broken: #b3403a;\n  --ew-link-broken-decoration: #b3403a80;\n\n  --ew-node-dot-default: #8ab4d8;\n  /* §4.6 appearance-switcher dot palette (AI-IMP-109): the swatch row\n     in the charm popover. Node dots are world content, like the canvas\n     flat swatches below — deliberately theme-independent, defined once\n     and never overridden per theme. There was no prior multi-colour\n     dot palette (only the single default); this is its source. */\n  --ew-node-dot-blue: #8ab4d8;\n  --ew-node-dot-teal: #62b6a6;\n  --ew-node-dot-green: #8cc47a;\n  --ew-node-dot-gold: #e8c450;\n  --ew-node-dot-orange: #e0975a;\n  --ew-node-dot-red: #d97a72;\n  --ew-node-dot-purple: #b295d6;\n  --ew-node-dot-pink: #d987b8;\n  --ew-zero-node-note-dot: #8a94a0;\n  --ew-tag-default: #a8c7e8;\n  --ew-color-input-empty: #000000;\n\n  /* §11.5 flat canvas color swatches (AI-IMP-074): board paint for\n     canvases with no background of their own. Deliberately identical\n     on every theme — this is the user's board color, not chrome. */\n  --ew-canvas-flat-1: #1b2733;\n  --ew-canvas-flat-2: #22301f;\n  --ew-canvas-flat-3: #33241f;\n  --ew-canvas-flat-4: #2c2233;\n  --ew-canvas-flat-5: #3a362f;\n  --ew-canvas-flat-6: #e8e0cd;\n\n  /* ─── Design-pass additions (Style Guide v2 ■ TECH, 2026-07-07) ───\n     World-content materials — theme-independent like the dot palette,\n     defined once and never overridden per theme (glass excepted where\n     paper itself inverts). Values marked ~ in the guide are provisional. */\n\n  /* The lit stage and the void (rev 0.50, §6.7): the void derives from\n     the EFFECTIVE board color — never a second raw color. The engine\n     sets --ew-board-color to the effective background; void is OFF on\n     glass (the desktop is the stage there). */\n  --ew-board-color: var(--ew-surface-solid);\n  --ew-void-surface: color-mix(in oklab, var(--ew-board-color) 78%, black);\n\n  /* Paper materials (doctrine): the pinned state's permanent marks.\n     Tape + torn edge survive light/dark/glass. */\n  --ew-tape-surface: rgba(214, 205, 182, 0.6);\n  --ew-tape-border: rgba(160, 150, 125, 0.4);\n  --ew-paper-torn: #f7f3ea;\n\n  /* Object icon set (Icon Document 2b family): top-light gradient\n     pairs, stroke ≈ -lo darkened ~20%, restrained gloss. One color\n     token tints dot and icon alike; SVG masters in assets/icons/. */\n  --ew-obj-blue-hi: #a8cbe8;\n  --ew-obj-blue-lo: #6b9cc4;\n  --ew-obj-blue-stroke: #4a7096;\n  --ew-obj-gold-hi: #f2d878;\n  --ew-obj-gold-lo: #d9ab2e;\n  --ew-obj-gold-stroke: #a87f18;\n  --ew-obj-red-hi: #f0847c;\n  --ew-obj-red-lo: #c0392f;\n  --ew-obj-red-stroke: #8f2f27;\n  --ew-obj-pink-hi: #e8b0d4;\n  --ew-obj-pink-lo: #c46a9e;\n  --ew-obj-pink-stroke: #96487a;\n  --ew-obj-orange-hi: #eec08a;\n  --ew-obj-orange-lo: #c87d3e;\n  --ew-obj-orange-stroke: #9a5f2a;\n  --ew-obj-green-hi: #aad494;\n  --ew-obj-green-lo: #6f9e58;\n  --ew-obj-green-stroke: #4f7a3c;\n  --ew-obj-gloss: rgba(255, 255, 255, 0.42);\n  /* Fixed drawing constants from the ratified masters (assets/icons/) */\n  --ew-obj-pin-hole: #22303c;\n  --ew-obj-flag-pole: #8a7748;\n  --ew-obj-leaf-vein: #3c5c2e;\n  /* The push pin's metal stem (Note Lifecycle beat 6) */\n  --ew-pushpin-stem: #8a8f98;\n\n  /* Note heading colors (~): loud by default, riding theme tokens.\n     Notes are paper (light) on dark + light themes; glass overrides. */\n  --ew-note-h1: #2b6cb0;\n  --ew-note-h2: #3b8a7d;\n  --ew-note-h3: #9c7f2e;\n}\n\n:root[data-theme='light'] {\n  color-scheme: light;\n\n  --ew-surface: rgba(244, 245, 247, 0.94);\n  --ew-surface-solid: #f4f5f7;\n  --ew-surface-raised: #e7eaee;\n  --ew-surface-hover: #dbe0e7;\n  --ew-surface-control-hover: #d1d7df;\n  --ew-surface-menu: rgba(244, 245, 247, 0.96);\n  --ew-surface-rail: rgba(244, 245, 247, 0.9);\n  --ew-surface-subtle: rgba(244, 245, 247, 0.86);\n  --ew-surface-overlay: rgba(244, 245, 247, 0.97);\n  --ew-surface-modal: #eef1f5;\n  --ew-surface-input: #ffffff;\n  --ew-border: #c9ced6;\n  --ew-border-strong: #aeb6c0;\n  --ew-border-panel: #b8c1cc;\n  --ew-border-control: #aeb6c0;\n  --ew-border-accent-subtle: #9fb9d4;\n  --ew-frame-fill: #d4dae2;\n  --ew-frame-border: #aeb6c0;\n  --ew-frame-label: #6b727c;\n  --ew-text: #1d232b;\n  --ew-text-soft: #2f3945;\n  --ew-text-muted: #5a6572;\n  --ew-text-subtle: #6b7684;\n  --ew-text-dialog: #1d232b;\n  --ew-accent: #2b6cb0;\n  --ew-accent-soft: #2f78c4;\n  --ew-on-accent: #f4f5f7;\n  --ew-danger: #a63430;\n  --ew-on-danger: #ffffff;\n  --ew-danger-surface: rgba(253, 232, 230, 0.96);\n  --ew-danger-surface-solid: #f7e4e2;\n  --ew-danger-text: #7c2d27;\n  --ew-danger-border: #d9a09a;\n  --ew-danger-muted: #9a5c56;\n  --ew-success-border: #6aa277;\n  --ew-warn: #8a6414;\n  --ew-warn-border: #b49443;\n  --ew-warn-muted: #7a5f14;\n  --ew-warn-muted-border: #d9c68a;\n  --ew-scrim: rgba(70, 75, 85, 0.45);\n  --ew-dialog-scrim: rgba(70, 75, 85, 0.25);\n  --ew-control-tint: rgba(29, 35, 43, 0.08);\n  --ew-shadow: rgba(8, 10, 14, 0.18);\n  --ew-dialog-shadow: rgba(8, 10, 14, 0.18);\n  --ew-menu-shadow: rgba(8, 10, 14, 0.2);\n  --ew-accent-halo: rgba(43, 108, 176, 0.85);\n  --ew-accent-halo-shadow: rgba(43, 108, 176, 0.35);\n  --ew-focus-ring: rgba(43, 108, 176, 0.65);\n  --ew-focus-ring-fade: rgba(43, 108, 176, 0);\n  --ew-warn-pulse: rgba(138, 100, 20, 0.55);\n  --ew-warn-pulse-fade: rgba(138, 100, 20, 0);\n\n  --ew-body-text: #1d232b;\n  --ew-paper-surface: #f4f5f7;\n  --ew-paper-page: #ffffff;\n  --ew-paper-border: #c9ced6;\n  --ew-paper-border-subtle: #dce1e8;\n  --ew-paper-border-strong: #aeb6c0;\n  --ew-paper-border-focus: #aeb6c0;\n  --ew-paper-pinned-border: #8aa9c7;\n  --ew-paper-text: #1d232b;\n  --ew-paper-text-strong: #10131a;\n  --ew-paper-text-heading: #1d232b;\n  --ew-paper-text-muted: #5a6572;\n  --ew-paper-text-subtle: #5a6572;\n  --ew-paper-text-soft: #6b7684;\n  --ew-paper-hover: #e7eaee;\n  --ew-paper-info-surface: #dce9f7;\n  --ew-paper-info-panel: #e6f0fa;\n  --ew-paper-info-text: #2b6cb0;\n  --ew-paper-info-border: #9fb9d4;\n  --ew-paper-danger-surface: #fbeaea;\n  --ew-paper-danger-text: #8c2f2f;\n  --ew-paper-tail: #7f8898;\n  --ew-paper-chip-surface: #e7eaee;\n  --ew-paper-chip-border: #c9ced6;\n  --ew-paper-chip-text: #3b4350;\n  --ew-paper-dirty: #8a6414;\n  --ew-paper-trash-surface: #f3ead3;\n  --ew-paper-trash-border: #d9c68a;\n  --ew-paper-trash-text: #7a5f14;\n  --ew-paper-broken-surface: #f7e4e2;\n  --ew-paper-broken-border: #d9a09a;\n  --ew-paper-broken-text: #7c2d27;\n  --ew-paper-broken-muted: #9a5c56;\n\n  --ew-link-bound: #2b6cb0;\n  --ew-link-bound-decoration: #2b6cb080;\n  --ew-link-muted: #6b7684;\n  --ew-link-unresolved: #6d48a8;\n  --ew-link-unresolved-decoration: #6d48a880;\n  --ew-link-broken: #a63430;\n  --ew-link-broken-decoration: #a6343080;\n}\n\n:root[data-theme='glass'] {\n  color-scheme: dark;\n\n  --ew-surface: rgba(23, 25, 29, 0.6);\n  --ew-surface-solid: #17191d;\n  --ew-surface-raised: rgba(35, 38, 44, 0.72);\n  --ew-surface-hover: rgba(42, 46, 53, 0.78);\n  --ew-surface-control-hover: rgba(58, 63, 71, 0.78);\n  --ew-surface-menu: rgba(23, 25, 29, 0.7);\n  --ew-surface-rail: rgba(23, 25, 29, 0.56);\n  --ew-surface-subtle: rgba(23, 25, 29, 0.5);\n  --ew-surface-overlay: rgba(23, 25, 29, 0.74);\n  --ew-surface-modal: rgba(34, 38, 44, 0.72);\n  --ew-surface-input: rgba(23, 25, 29, 0.72);\n  --ew-danger-surface: rgba(59, 31, 31, 0.76);\n  --ew-danger-surface-solid: rgba(59, 31, 31, 0.82);\n  --ew-scrim: rgba(12, 13, 16, 0.45);\n  --ew-dialog-scrim: rgba(0, 0, 0, 0.18);\n  --ew-control-tint: rgba(255, 255, 255, 0.1);\n  --ew-shadow: rgba(8, 10, 14, 0.28);\n  --ew-dialog-shadow: rgba(0, 0, 0, 0.22);\n  --ew-menu-shadow: rgba(0, 0, 0, 0.32);\n\n  --ew-body-text: #dde3ea;\n  --ew-paper-surface: rgba(23, 25, 29, 0.72);\n  --ew-paper-page: rgba(16, 19, 26, 0.7);\n  --ew-paper-border: #3a3e46;\n  --ew-paper-border-subtle: #2e3138;\n  --ew-paper-border-strong: #3a3e46;\n  --ew-paper-border-focus: #4a9df0;\n  --ew-paper-pinned-border: #4a9df0;\n  --ew-paper-text: #dde3ea;\n  --ew-paper-text-strong: #f4f5f7;\n  --ew-paper-text-heading: #dde3ea;\n  --ew-paper-text-muted: #9aa3ad;\n  --ew-paper-text-subtle: #c8cfd8;\n  --ew-paper-text-soft: #79808a;\n  --ew-paper-hover: rgba(42, 46, 53, 0.78);\n  --ew-paper-info-surface: rgba(43, 108, 176, 0.22);\n  --ew-paper-info-panel: rgba(43, 108, 176, 0.18);\n  --ew-paper-info-text: #8ec2f5;\n  --ew-paper-info-border: #3a4a5e;\n  --ew-paper-danger-surface: rgba(59, 31, 31, 0.72);\n  --ew-paper-danger-text: #f3c9c9;\n  --ew-paper-tail: #7f8898;\n  --ew-paper-chip-surface: rgba(35, 38, 44, 0.72);\n  --ew-paper-chip-border: #3a3e46;\n  --ew-paper-chip-text: #dde3ea;\n  --ew-paper-dirty: #e6b34a;\n  --ew-paper-trash-surface: rgba(71, 57, 27, 0.72);\n  --ew-paper-trash-border: #6b5426;\n  --ew-paper-trash-text: #e6b34a;\n  --ew-paper-broken-surface: rgba(59, 31, 31, 0.72);\n  --ew-paper-broken-border: #7c3a3a;\n  --ew-paper-broken-text: #f3c9c9;\n  --ew-paper-broken-muted: #e8a49f;\n\n  --ew-link-bound: #8ec2f5;\n  --ew-link-bound-decoration: #8ec2f580;\n  --ew-link-muted: #9aa3ad;\n  --ew-link-unresolved: #c5a3ff;\n  --ew-link-unresolved-decoration: #c5a3ff80;\n  --ew-link-broken: #f3c9c9;\n  --ew-link-broken-decoration: #f3c9c980;\n\n  /* Glass: paper is dark here, so the loud headings lighten (~). */\n  --ew-note-h1: #8ec2f5;\n  --ew-note-h2: #7ec9b8;\n  --ew-note-h3: #d9bc6a;\n}\n\n/* Expanding Worlds — chrome feel + canvas presentation tokens.\n   Sources: apps/desktop/src/renderer/chrome/feel.ts (RFC §8.2 rev 0.17)\n   and the UI Vision artifact (Design-Artifacts-v1.0). Numbers are the\n   app's shipped \"provisional feel numbers\" — copy them exactly. */\n:root {\n  /* Engagement cadence (feel.ts). ALL chrome fades on ONE shared clock. */\n  --ew-chrome-fade-delay-ms: 4000ms; /* @kind other */ /* idle before chrome fades */\n  --ew-chrome-fade-ms: 240ms; /* @kind other */ /* the shared fade transition */\n  --ew-chrome-rest-opacity: 0.92; /* @kind other */ /* chrome rests here; hover → 1 */\n  --ew-hint-charm-rest-opacity: 0.7; /* @kind other */ /* node hint charms census level */\n  --ew-tooltip-delay-ms: 500ms; /* @kind other */ /* tooltip chip delay */\n  --ew-toast-duration-ms: 6000ms; /* @kind other */ /* non-sticky toast lifetime */\n  --ew-perch-pulse-ms: 700ms; /* @kind other */ /* perch single arrival pulse */\n\n  /* Canvas grid (UI Vision). Lines default; dots 26px radial; none. */\n  --ew-grid-line: rgba(255, 255, 255, 0.055);\n  --ew-grid-bg: linear-gradient(var(--ew-grid-line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--ew-grid-line) 1px, transparent 1px);\n  --ew-grid-size: 44px 44px;\n\n  /* Board card (world content): flat, tiny radius, soft drop. */\n  --ew-node-radius: 3px;\n  --ew-node-shadow: 0 8px 22px rgba(0, 0, 0, 0.3);\n\n  /* Screen-space panel depth cues (§8.5: shadow = screen-space). */\n  --ew-panel-shadow: 0 6px 22px var(--ew-shadow);\n  --ew-panel-shadow-pinned: 0 10px 30px var(--ew-shadow);\n  --ew-panel-shadow-menu: 0 10px 28px var(--ew-menu-shadow);\n\n  /* ─── Design-pass additions (Style Guide v2 ■ TECH) ─── */\n\n  /* Floating things cast shadows (§8.5 extended): anything torn off or\n     riding a drag — mid-tear note, drag ghost, place cursor — picks up\n     this shadow exactly while it floats. On at drag/tear start, off on\n     settle. (~) */\n  --ew-drag-shadow: 0 12px 26px rgba(0, 0, 0, 0.5);\n\n  /* World-content motion beats (§8.2 rev 0.55 — the beat ledger, from\n     the Two Materials hero doc): ONE-shot, one beat per user act, never\n     ambient, never looping. Six verbs cover everything: lift · settle ·\n     nudge · press · tear · glide. Chrome keeps the fade clock above and\n     animates exactly ONE property — opacity.\n     (~ except tear, confirmed at t9) */\n  --ew-beat-lift-ms: 120ms; /* @kind other */ /* grab — shadow on, +1% scale */\n  --ew-beat-settle-ms: 150ms; /* @kind other */ /* release — one ease-out, no bounce */\n  --ew-beat-nudge-ms: 40ms; /* @kind other */ /* snap engage — last-px magnetic seat */\n  --ew-beat-tear-ms: 300ms; /* @kind other */ /* pin tear-off, ease-out */\n  --ew-beat-cover-ms: 200ms; /* @kind other */ /* note cover open */\n  --ew-beat-tuck-ms: 200ms; /* @kind other */ /* tuck back to bound */\n  --ew-beat-bloom-ms: 240ms; /* @kind other */ /* first-placement bloom */\n  --ew-beat-stage-edge-ms: 180ms; /* @kind other */ /* stage growth ease */\n  --ew-beat-away-ms: 180ms; /* @kind other */ /* delete — up + fade; NEVER a crumple */\n  --ew-beat-glide-max-ms: 300ms; /* @kind other */ /* pan-flick friction cap, no rubber band */\n  --ew-beat-lift-scale: 1.01; /* @kind other */ /* lift rides +1% */\n  --ew-beat-press-scale: 0.99; /* @kind other */ /* lock presses −1% into the desk */\n  --ew-beat-strain-px: 2px; /* locked grab strains sideways, never lifts */\n  /* No beat, on purpose: resize · rotate · crop · marquee · draw · pan-grab. */\n\n  /* The shrink ladder (§8.2 rev 0.55): world shrinks honestly, chrome\n     holds screen size, ALL furniture rides one shared threshold. Any\n     rendered-size conditional not referencing these is a review failure. */\n  --ew-furniture-min-px: 8px; /* object icons → dot; furniture vanishes */\n  --ew-page-floor-px: 48px; /* rings → stroke; below, the page fades whole */\n\n  /* Void grid: the stage's grid-line alpha × ~0.4. Void is OFF on glass. */\n  --ew-void-grid-line: rgba(255, 255, 255, 0.022);\n\n  /* The named z-ladder (§8.8) — names normative; a guard fails any\n     literal z-index in app code. Modals mount at the root host. */\n  --ew-z-world: 0; /* @kind other */\n  --ew-z-affordance: 100; /* @kind other */\n  --ew-z-panel: 200; /* @kind other */\n  --ew-z-takeover: 300; /* @kind other */\n  --ew-z-chrome: 400; /* @kind other */\n  --ew-z-popover: 500; /* @kind other */\n  --ew-z-modal: 600; /* @kind other */\n  --ew-z-notice: 700; /* @kind other */\n  --ew-z-tooltip: 800; /* @kind other */\n}\n\n:root[data-theme='light'] {\n  --ew-grid-line: rgba(0, 0, 0, 0.075);\n  --ew-void-grid-line: rgba(0, 0, 0, 0.03);\n}\n\n[data-grid='dots'] {\n  --ew-grid-bg: radial-gradient(var(--ew-grid-line) 1.3px, transparent 1.5px);\n  --ew-grid-size: 26px 26px;\n}\n\n[data-grid='none'] {\n  --ew-grid-bg: none;\n}\n\n/* Expanding Worlds — typography. Chrome uses the platform UI stack\n   (native desktop tool; deliberately no webfonts in chrome). Chrome\n   type is small (0.6–0.95rem); mono is for shortcuts, tags, counts\n   and technical fragments.\n   THE ONE CARVE-OUT (ratified 2026-07-06): note text is Maple Mono —\n   kerned rounded mono, true cursive italics, OFL — bundled from\n   assets/fonts/, never fetched at runtime. It applies to note panels,\n   the big editor, card excerpts, gallery text posts; NOWHERE in chrome. */\n:root {\n  --ew-font-ui: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, sans-serif;\n  --ew-font-mono: ui-monospace, Menlo, monospace;\n  --ew-font-editor: 'Maple Mono', ui-monospace, Menlo, monospace;\n\n  /* Chrome type scale (from shipped component CSS; rem-based, 16px root) */\n  --ew-text-charm: 1rem;        /* rail glyphs */\n  --ew-text-tool: 0.95rem;      /* dock tool glyphs */\n  --ew-text-toast: 0.85rem;     /* toasts, note body, panel base */\n  --ew-text-panel: 0.78rem;     /* panel chrome, facet bars */\n  --ew-text-menu: 0.75rem;      /* menu rows, path bar, dock rows */\n  --ew-text-chip: 0.7rem;       /* tag chips, origin labels */\n  --ew-text-micro: 0.62rem;     /* thumbnail mini-labels, counts */\n\n  /* Editor scale (~, Style Guide v2 §3): body .85rem/1.65; headings\n     are LOUD — size AND color (--ew-note-h1/2/3), org-style folding\n     presentation over the Markdown carrier. */\n  --ew-editor-body: 0.85rem;\n  --ew-editor-line: 1.65; /* @kind other */\n  --ew-editor-h1: 1.15rem;\n  --ew-editor-h2: 1rem;\n  --ew-editor-h3: 0.9rem;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--ew-font-ui);\n  color: var(--ew-text);\n}\n\n/* Expanding Worlds — the editor face. Maple Mono (OFL), the ONE\n   webfont carve-out (ratified 2026-07-06; Note Editor Wireframes\n   4a/4c — Geist and Martian fell to the no-true-italic check).\n   Bundled woff2, latin subset, never fetched at runtime.\n   License: assets/fonts/LICENSE-OFL.txt. Chrome stays system stacks. */\n@font-face {\n  font-family: 'Maple Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"93aa0e38-be4a-436b-b17d-301d2d9ff616\") format('woff2');\n}\n@font-face {\n  font-family: 'Maple Mono';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f013f494-b1b3-4a39-a524-851796954736\") format('woff2');\n}\n@font-face {\n  font-family: 'Maple Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"582584a6-2685-4bf1-8d42-166e16c48cf3\") format('woff2');\n}\n\n<\u002Fstyle>\n\n<style>\n  body{margin:0;background:var(--ew-surface-solid);color:var(--ew-text);font-family:var(--ew-font-ui)}\n  a{color:var(--ew-accent)}a:hover{color:var(--ew-accent-soft)}\n  .wrap{max-width:1060px;margin:0 auto;padding:0 40px}\n  section{border-top:1px solid var(--ew-border);padding:44px 0 52px}\n  .kicker{font-family:var(--ew-font-mono);font-size:11px;letter-spacing:.14em;color:var(--ew-warn)}\n  h2{margin:10px 0 0;font-size:22px;font-weight:600;letter-spacing:-.01em}\n  .lede{max-width:640px;margin:12px 0 0;font-size:13.5px;line-height:1.7;color:var(--ew-text-muted)}\n  .mono{font-family:var(--ew-font-mono)}\n  .cardrow{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px;align-items:flex-start}\n  .card{background:var(--ew-surface-raised);border:1px solid var(--ew-border);border-radius:10px;padding:16px 18px}\n  .cap{font-family:var(--ew-font-mono);font-size:10px;letter-spacing:.14em;color:var(--ew-text-subtle);margin-bottom:12px}\n  .sw{width:64px}\n  .sw .chip{height:36px;border-radius:5px;border:1px solid var(--ew-border)}\n  .sw .nm{font-size:10px;color:var(--ew-text-muted);margin-top:5px;line-height:1.4}\n  .sw .hx{font-family:var(--ew-font-mono);font-size:9px;color:var(--ew-text-subtle)}\n  .swrow{display:flex;gap:10px;flex-wrap:wrap}\n  .glyph{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;padding:0 7px;border-radius:7px;background:var(--ew-control-tint);border:1px solid var(--ew-border);font-family:var(--ew-font-mono);font-size:14px;color:var(--ew-text)}\n  .beatrow{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--ew-text)}\n  .beatrow .lbl{width:210px;flex:none}\n  .beatrow .lbl span{color:var(--ew-text-subtle)}\n  .beatrow .bar{position:relative;height:8px;background:var(--ew-surface-solid);border:1px solid var(--ew-border);border-radius:4px;flex:1}\n  .beatrow .fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;background:var(--ew-accent)}\n  .beatrow .ms{width:52px;text-align:right;font-family:var(--ew-font-mono);font-size:10px;color:var(--ew-text-muted)}\n  .fine{margin-top:12px;font-size:10.5px;line-height:1.7;color:var(--ew-text-subtle)}\n  .rule{font-family:var(--ew-font-mono);font-size:11px;line-height:2.05;color:var(--ew-text-muted)}\n  .board{background-image:var(--ew-grid-bg);background-size:var(--ew-grid-size);background-color:var(--ew-surface-solid)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <!-- header -->\n  <div class=\"wrap\" style=\"padding-top:44px;padding-bottom:40px\">\n    <div class=\"kicker\">EXPANDING WORLDS · DESIGN KIT · STANDALONE REFERENCE · RFC REV 0.55 · 7 JULY 2026<\u002Fdiv>\n    <h1 style=\"margin:16px 0 0;font-size:30px;line-height:1.25;font-weight:600;letter-spacing:-.01em\">\n      <span class=\"mono\" style=\"color:var(--ew-text-subtle);font-weight:400\">Chrome is a terminal. <\u002Fspan><span style=\"font-family:var(--ew-font-editor);color:#f2efe6\">The world is a desk.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"lede\">The visual system for the art-first, recursive reference-board desktop app — one page, self-contained. Every pixel is made of one of two materials: flat mono terminal chrome around the canvas, and world content with gentle physics on it. Authority: current RFC &gt; Design-letter-3 &gt; this kit. Canonical tokens: <span class=\"mono\">tokens/theme.css<\u002Fspan>; the ■ TECH contract: <span class=\"mono\">STYLE-GUIDE.md<\u002Fspan>.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- doctrine -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">01 · THE DOCTRINE<\u002Fdiv>\n      <h2>Two materials, three questions<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">THE TERMINAL — RAIL · DOCK · MENUS · PANELS · TOOLTIPS<\u002Fdiv>\n          <div class=\"rule\">flat — no gradient, gloss, bevel, or resting shadow<br>unicode glyphs, printed shortcuts, sentence case, verbs<br>state = color and fill, never motion<br>animates exactly one property — opacity, on one shared clock<br>the GUI is the tutorial: hover names the control + its key<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">THE DESK — ART · PAPER NOTES · OBJECT ICONS · THE STAGE<\u002Fdiv>\n          <div class=\"rule\">objects with mass: they lift, settle, tear, press, and burn<br>hardware tells the state — rings bound · tape sticky · push pin landmark<br>one-shot physical beats, one per user act, never ambient<br>the torn edge persists — the page remembers<br>never a metaphor that lies: an honest terminal beats a lying desk<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"fine\">Which material am I in? 1 · does the user OWN it? (they placed/wrote/made it → desk; the app provides it → terminal) · 2 · should the state change be VISIBLE as an event? (desk makes state physical; terminal changes by color and fill, silently) · 3 · would the metaphor ever LIE? (then it is forbidden, even on the desk).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- color -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">02 · COLOR — EVERY COLOR IS AN --ew-* TOKEN FIRST<\u002Fdiv>\n      <h2>Chrome, paper, and world palettes<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\">\n          <div class=\"cap\">CHROME — NEAR-BLACK BLUE-GREY, ONE BLUE ACCENT<\u002Fdiv>\n          <div class=\"swrow\">\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-surface-solid)\"><\u002Fdiv><div class=\"nm\">surface<\u002Fdiv><div class=\"hx\">#17191d<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-surface-raised)\"><\u002Fdiv><div class=\"nm\">raised<\u002Fdiv><div class=\"hx\">#23262c<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-surface-hover)\"><\u002Fdiv><div class=\"nm\">hover<\u002Fdiv><div class=\"hx\">#2a2e35<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-border-strong)\"><\u002Fdiv><div class=\"nm\">border strong<\u002Fdiv><div class=\"hx\">#3a3e46<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-text)\"><\u002Fdiv><div class=\"nm\">text<\u002Fdiv><div class=\"hx\">#dde3ea<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-text-muted)\"><\u002Fdiv><div class=\"nm\">text muted<\u002Fdiv><div class=\"hx\">#9aa3ad<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-accent)\"><\u002Fdiv><div class=\"nm\">accent<\u002Fdiv><div class=\"hx\">#4a9df0<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-danger)\"><\u002Fdiv><div class=\"nm\">danger<\u002Fdiv><div class=\"hx\">#b3403a<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-warn)\"><\u002Fdiv><div class=\"nm\">warn<\u002Fdiv><div class=\"hx\">#e6b34a<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">Surfaces are translucent rgba over the board (0.82–0.97 by layer); light theme flips to #f4f5f7 with accent #2b6cb0; glass adds blur, Mac-only.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"cap\">PAPER — NOTES ARE LIGHT ON EVERY THEME<\u002Fdiv>\n          <div class=\"swrow\">\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-paper-page)\"><\u002Fdiv><div class=\"nm\">page<\u002Fdiv><div class=\"hx\">#ffffff<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-paper-surface)\"><\u002Fdiv><div class=\"nm\">surface<\u002Fdiv><div class=\"hx\">#fafafa<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-paper-torn)\"><\u002Fdiv><div class=\"nm\">torn edge<\u002Fdiv><div class=\"hx\">#f7f3ea<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-tape-surface)\"><\u002Fdiv><div class=\"nm\">tape<\u002Fdiv><div class=\"hx\">α .6<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ew-paper-text)\"><\u002Fdiv><div class=\"nm\">ink<\u002Fdiv><div class=\"hx\">#333333<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">Wiki links on paper: <span style=\"color:var(--ew-link-bound);text-decoration:underline;text-decoration-color:var(--ew-link-bound-decoration)\">bound<\u002Fspan> · <span style=\"color:var(--ew-link-unresolved);text-decoration:underline;text-decoration-color:var(--ew-link-unresolved-decoration)\">unresolved<\u002Fspan> · <span style=\"color:var(--ew-link-broken);text-decoration:line-through;text-decoration-color:var(--ew-link-broken-decoration)\">broken strikes through<\u002Fspan>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cardrow\">\n        <div class=\"card\">\n          <div class=\"cap\">NODE DOTS — WORLD CONTENT, THEME-INDEPENDENT<\u002Fdiv>\n          <div class=\"swrow\">\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-blue)\"><\u002Fdiv><div class=\"nm\">blue<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-teal)\"><\u002Fdiv><div class=\"nm\">teal<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-green)\"><\u002Fdiv><div class=\"nm\">green<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-gold)\"><\u002Fdiv><div class=\"nm\">gold<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-orange)\"><\u002Fdiv><div class=\"nm\">orange<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-red)\"><\u002Fdiv><div class=\"nm\">red<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-purple)\"><\u002Fdiv><div class=\"nm\">purple<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:34px\"><div class=\"chip\" style=\"height:22px;border-radius:50%;width:22px;background:var(--ew-node-dot-pink)\"><\u002Fdiv><div class=\"nm\">pink<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"cap\">CANVAS FLATS — USER BOARD PAINT<\u002Fdiv>\n          <div class=\"swrow\">\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-1)\"><\u002Fdiv><div class=\"nm\">1<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-2)\"><\u002Fdiv><div class=\"nm\">2<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-3)\"><\u002Fdiv><div class=\"nm\">3<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-4)\"><\u002Fdiv><div class=\"nm\">4<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-5)\"><\u002Fdiv><div class=\"nm\">5<\u002Fdiv><\u002Fdiv>\n            <div class=\"sw\" style=\"width:44px\"><div class=\"chip\" style=\"background:var(--ew-canvas-flat-6)\"><\u002Fdiv><div class=\"nm\">6<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">The void derives from the effective board color — <span class=\"mono\">color-mix(in oklab, board 78%, black)<\u002Fspan>, dimmed grid, soft edge; OFF on glass.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- type -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">03 · TYPE — SYSTEM STACK IN CHROME; MAPLE MONO IS THE ONE CARVE-OUT<\u002Fdiv>\n      <h2>Chrome scale and the editor face<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">CHROME SCALE — SMALL, WEIGHT 600 MAX<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <div style=\"font-size:1rem\">charm 1rem — rail glyphs<\u002Fdiv>\n            <div style=\"font-size:.95rem\">tool .95rem — dock glyphs<\u002Fdiv>\n            <div style=\"font-size:.85rem\">toast .85rem — toasts, panel base<\u002Fdiv>\n            <div style=\"font-size:.78rem\">panel .78rem — panel chrome, facet bars<\u002Fdiv>\n            <div style=\"font-size:.75rem\">menu .75rem — menu rows, path bar<\u002Fdiv>\n            <div style=\"font-size:.7rem\">chip .7rem — tag chips, origin labels<\u002Fdiv>\n            <div style=\"font-size:.62rem\">micro .62rem — counts, mini-labels<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">Mono (<span class=\"mono\">ui-monospace<\u002Fspan>) for shortcuts, #tags, counts, zoom % — tabular-nums.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"flex:1;min-width:300px;background:var(--ew-paper-page);border-color:var(--ew-paper-border)\">\n          <div class=\"cap\" style=\"color:var(--ew-paper-text-soft)\">NOTE TEXT — MAPLE MONO, LOUD COLORED HEADINGS<\u002Fdiv>\n          <div style=\"font-family:var(--ew-font-editor);color:var(--ew-paper-text)\">\n            <div style=\"font-size:1.15rem;font-weight:700;color:var(--ew-note-h1)\">The Northern Reach<\u002Fdiv>\n            <div style=\"font-size:1rem;font-weight:700;color:var(--ew-note-h2);margin-top:8px\">The warren gate<\u002Fdiv>\n            <div style=\"font-size:.85rem;line-height:1.65;margin-top:6px\">Tolls kept by <span style=\"color:var(--ew-link-bound);text-decoration:underline;text-decoration-color:var(--ew-link-bound-decoration)\">[[Yorren]]<\u002Fspan>. The chain is older than the wall — salvage iron, warren-forged. <em>Owes a life-debt he resents.<\u002Fem><\u002Fdiv>\n            <div style=\"font-size:.9rem;font-weight:700;color:var(--ew-note-h3);margin-top:8px\">Tolls <span style=\"color:var(--ew-paper-text-soft);font-weight:400\">[...]<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\" style=\"color:var(--ew-paper-text-soft)\">Bundled woff2 (OFL), never fetched at runtime; note panels, big editor, excerpts, gallery text posts — NOWHERE in chrome.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- shape + depth -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">04 · SHAPE + DEPTH — SHADOW IS THE LAYER GRAMMAR<\u002Fdiv>\n      <h2>Radii tiers; floating things cast shadows<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">RADII — BY TIER, 1PX TOKEN-TIERED BORDERS<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end\">\n            <div style=\"width:54px;height:40px;border-radius:3px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">card 3<\u002Fdiv>\n            <div style=\"width:54px;height:40px;border-radius:5px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">button 5<\u002Fdiv>\n            <div style=\"width:54px;height:40px;border-radius:7px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">charm 7<\u002Fdiv>\n            <div style=\"width:54px;height:40px;border-radius:9px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">panel 9<\u002Fdiv>\n            <div style=\"width:54px;height:40px;border-radius:12px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">bar 12<\u002Fdiv>\n            <div style=\"width:54px;height:28px;border-radius:999px;border:1px solid var(--ew-border-strong);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">chip 999<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">Selection = 2px accent outline, offset 3px — never drawn handles. Controls ~30px square; compact rem paddings (.15–.75).<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card board\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">SHADOW = VIEWPORT-FLOATING ONLY; FLAT = WORLD<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap\">\n            <div style=\"width:96px;height:56px;border-radius:9px;background:var(--ew-surface);border:1px solid var(--ew-border-panel);box-shadow:var(--ew-panel-shadow);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">panel 6/22<\u002Fdiv>\n            <div style=\"width:96px;height:56px;border-radius:9px;background:var(--ew-paper-page);border:1px solid var(--ew-paper-border);box-shadow:0 10px 30px var(--ew-shadow);display:grid;place-items:center;font-size:9px;color:var(--ew-paper-text-muted)\">sticky 10/30<\u002Fdiv>\n            <div style=\"width:96px;height:56px;border-radius:3px;background:var(--ew-paper-page);border:1px solid var(--ew-paper-border);display:grid;place-items:center;font-size:9px;color:var(--ew-paper-text-muted)\">landmark — flat<\u002Fdiv>\n            <div style=\"width:96px;height:56px;border-radius:3px;background:var(--ew-surface-raised);border:1px solid var(--ew-border);box-shadow:var(--ew-drag-shadow);transform:rotate(-2deg);display:grid;place-items:center;font-size:9px;color:var(--ew-text-muted)\">mid-drag 12/26<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fine\">Drag shadow rides exactly while something floats — on at tear/drag start, off on settle. No inner shadows, ever.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- motion -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">05 · MOTION — TWO BUDGETS (§8.2 REV 0.55, THE TWO MATERIALS)<\u002Fdiv>\n      <h2>The chrome clock and the world-beat ledger<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:none;min-width:250px\">\n          <div class=\"cap\">CHROME — ONE CLOCK, ONE PROPERTY<\u002Fdiv>\n          <div class=\"rule\">fades + single pulses only, ease-out<br>idle 4000ms → fade 240ms, all together<br>rest .92 · hover lights one control to 1<br>hint charms rest .7 · perch pulse 700ms once<br>tooltip 500ms · toast 6000ms<br>opacity only — never a second clock<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"flex:1;min-width:340px\">\n          <div class=\"cap\">WORLD — SIX VERBS: LIFT · SETTLE · NUDGE · PRESS · TEAR · GLIDE<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <div class=\"beatrow\"><span class=\"lbl\"><b>tear<\u002Fb> <span>— note tear-off (confirmed)<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:100%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">300ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>glide<\u002Fb> <span>— pan flick, friction cap ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:100%;opacity:.55\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">≤300ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>bloom<\u002Fb> <span>— first placement ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:80%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">240ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>cover · tuck<\u002Fb> <span>— note open/close ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:67%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">200ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>lift, away<\u002Fb> <span>— delete, up + fade ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:60%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">180ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>stage edge<\u002Fb> <span>— growth ease ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:60%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">180ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>settle<\u002Fb> <span>— release, no bounce ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:50%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">150ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>lift<\u002Fb> <span>— grab, shadow + 1% ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:40%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">120ms<\u002Fspan><\u002Fdiv>\n            <div class=\"beatrow\"><span class=\"lbl\"><b>nudge<\u002Fb> <span>— snap's last-px seat ~<\u002Fspan><\u002Fspan><div class=\"bar\"><div class=\"fill\" style=\"width:13%\"><\u002Fdiv><\u002Fdiv><span class=\"ms\">40ms<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"fine\">One beat per user act, ±1% scale, never ambient, never looping. Press has no duration: lock sits −1% in the desk; a locked grab strains 2px, never lifts. Delete lifts AWAY, never a crumple — the trash keeps things whole. No beat, on purpose: resize · rotate · crop · marquee · draw · pan-grab. The shrink ladder: world shrinks honestly, chrome holds size, ALL furniture on one threshold — <span class=\"mono\">--ew-furniture-min-px ~8<\u002Fspan> (icons → dot) · <span class=\"mono\">--ew-page-floor-px ~48<\u002Fspan> (rings → stroke; below, the page fades whole).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- iconography -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">06 · ICONOGRAPHY — GLYPHS ARE TYPE; OBJECTS ARE WORLD<\u002Fdiv>\n      <h2>Unicode chrome, six painted objects<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">CHROME GLYPHS — NO ICON FONT, NO SVG SET, NO EMOJI<\u002Fdiv>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap\"><span class=\"glyph\">⧉<\u002Fspan><span class=\"glyph\">⌕<\u002Fspan><span class=\"glyph\">⊛<\u002Fspan><span class=\"glyph\">⊞<\u002Fspan><span class=\"glyph\">▤<\u002Fspan><span class=\"glyph\">☰<\u002Fspan><span class=\"glyph\" style=\"color:var(--ew-warn)\">⚠<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-top:8px\"><span class=\"glyph\">▸<\u002Fspan><span class=\"glyph\">T<\u002Fspan><span class=\"glyph\">▭<\u002Fspan><span class=\"glyph\">✎<\u002Fspan><span class=\"glyph\">╱<\u002Fspan><span class=\"glyph\">↗<\u002Fspan><span class=\"glyph\">⌁<\u002Fspan><span class=\"glyph\">◉<\u002Fspan><span class=\"glyph\">−<\u002Fspan><span class=\"glyph\" style=\"font-size:11px\">100%<\u002Fspan><span class=\"glyph\">+<\u002Fspan><span class=\"glyph\">⤢<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-top:8px\"><span class=\"glyph\">⌗<\u002Fspan><span class=\"glyph\">⇋<\u002Fspan><span class=\"glyph\">⇵<\u002Fspan><span class=\"glyph\">#<\u002Fspan><span class=\"glyph\">⊘<\u002Fspan>\n            <span style=\"display:inline-flex;align-items:center;gap:8px;margin-left:8px\"><span style=\"width:14px;height:14px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:1.5px solid var(--ew-text-muted)\"><\u002Fspan><span style=\"font-size:10px;color:var(--ew-text-subtle)\">the teardrop — pins mean places, everywhere<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card board\" style=\"flex:1;min-width:300px\">\n          <div class=\"cap\">THE SIX OBJECT ICONS — DOT-DEGRADING BELOW ~8PX<\u002Fdiv>\n          <div style=\"display:flex;gap:18px;align-items:center;flex-wrap:wrap\">\n            <img src=\"6204477c-4299-4a77-b67a-6919dbad0338\" width=\"34\" height=\"34\" alt=\"star\">\n            <img src=\"f9d4eba0-7813-4036-a224-ee6004a73008\" width=\"34\" height=\"34\" alt=\"pin\">\n            <img src=\"33b01e3d-2d34-4c80-8c5c-7f11dccf6d58\" width=\"34\" height=\"34\" alt=\"flag\">\n            <img src=\"6124242e-4d82-4d17-af38-ae6548e5b2b3\" width=\"34\" height=\"34\" alt=\"heart\">\n            <img src=\"6de48948-531b-4e73-92b8-67e13bbd5143\" width=\"34\" height=\"34\" alt=\"bolt\">\n            <img src=\"28060e0a-0cbb-4367-86f7-0d61fe1b584e\" width=\"34\" height=\"34\" alt=\"leaf\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:var(--ew-node-dot-gold)\"><\u002Fspan>\n            <span style=\"font-size:10px;color:var(--ew-text-subtle)\">← the dot it degrades to<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"fine\">Top-light gradients on the <span class=\"mono\">--ew-obj-*<\u002Fspan> pairs, restrained gloss — world content. The one glossy object near chrome is the red pin ON the paper.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- z + copy -->\n  <section>\n    <div class=\"wrap\">\n      <div class=\"kicker\">07 · THE Z-LADDER + COPY<\u002Fdiv>\n      <h2>Named rungs; sentence-case verbs<\u002Fh2>\n      <div class=\"cardrow\">\n        <div class=\"card\" style=\"flex:1;min-width:340px\">\n          <div class=\"cap\">THE NAMED Z-LADDER (§8.8) — NAMES NORMATIVE, NO LITERAL Z-INDEX<\u002Fdiv>\n          <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n            <span class=\"glyph\" style=\"font-size:10px\">world 0<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">affordance 100<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">panel 200<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">takeover 300<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">chrome 400<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">popover 500<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">modal 600<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">notice 700<\u002Fspan><span class=\"glyph\" style=\"font-size:10px\">tooltip 800<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"fine\">Everything anchors to its opener and clamps via one shared helper; the centered torn-off note is a MODAL-rung tenant with a scrim.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"flex:1;min-width:340px\">\n          <div class=\"cap\">COPY — THE GUI IS THE TUTORIAL<\u002Fdiv>\n          <div class=\"rule\">sentence case everything; no title case, no emoji, no exclamation<br>never \"file\" — the app copies bytes; \"item\" where a noun is unavoidable<br>verbs over nouns: Replace image… · Swap for… · open as source<br>confirmations state impact as fact: \"this will affect 35 placements — are you sure?\"<br>tooltips: five shapes only — name+shortcut · name-only · disabled-with-reason · state-with-exit · coming-soon<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"fine\" style=\"margin-top:26px\">Package index: <span class=\"mono\">tokens/<\u002Fspan> (theme · chrome feel · typography · editor face) · <span class=\"mono\">guidelines/<\u002Fspan> (17 specimen cards) · <span class=\"mono\">components/<\u002Fspan> (chrome · controls · panels · board · feedback) · <span class=\"mono\">ui_kits/desktop/<\u002Fspan> (7 interactive screens) · <span class=\"mono\">assets/<\u002Fspan> (Maple Mono woff2, 6 object-icon masters, seed art) · <span class=\"mono\">STYLE-GUIDE.md<\u002Fspan>. There is no logo — render \"Expanding Worlds\" in plain type. Compiled from the kit at RFC rev 0.55, 7 July 2026.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
