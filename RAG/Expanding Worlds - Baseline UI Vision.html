  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b6c4f204-5231-4d5d-a953-01e2bef50dd3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<style>/* Color Tool — webfonts\n   Fira Sans = UI / body. Fira Code = mono, numerics, vertical chart labels.\n   Vendored from the app (no CDN). See readme.md → ICONOGRAPHY / VISUAL FOUNDATIONS. */\n\n@font-face {\n  font-family: 'Fira Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9395ab56-97c1-430b-a125-065247ec64b6\") format('woff2');\n}\n@font-face {\n  font-family: 'Fira Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"1991ebcc-d546-4944-b9dc-ab43e658ad54\") format('woff2');\n}\n@font-face {\n  font-family: 'Fira Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c1ad4899-8004-40df-b06b-6282a1ab479d\") format('woff2');\n}\n\n@font-face {\n  font-family: 'Fira Code';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"002b54de-774e-4467-adbe-011b392cdf8f\") format('woff');\n}\n@font-face {\n  font-family: 'Fira Code';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8161a033-b57e-4176-8dbb-2d25bcc97c33\") format('woff');\n}\n@font-face {\n  font-family: 'Fira Code';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9e4c493e-66c4-4a3f-bfa7-0f5cf66c1719\") format('woff');\n}\n<\u002Fstyle>\n\n<style>\n  body{margin:0;background:#f5efe1;font-family:'Fira Sans',system-ui,sans-serif;color:#262626}\n  .doc{max-width:1120px;margin:0 auto;padding:56px 40px 80px}\n  .eyebrow{font:500 11px 'Fira Code',monospace;letter-spacing:.08em;text-transform:uppercase;color:#866051}\n  h1{font:700 34px/1.05 'Fira Sans',sans-serif;margin:10px 0 8px;letter-spacing:-.01em}\n  .sub{font:italic 400 15px/1.5 'Fira Sans',sans-serif;color:#5f5b5b;margin:0 0 22px;max-width:680px}\n  .lead{font:400 13.5px/1.7 'Fira Sans',sans-serif;color:#3f3b38;max-width:720px;margin:0 0 26px}\n  .decos{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 8px}\n  .chip{font:500 11px 'Fira Code',monospace;color:#262626;background:#fff;border:1px solid rgba(33,33,32,.16);border-radius:999px;padding:5px 12px}\n  .chip b{color:#866051}\n  .sechd{display:flex;align-items:baseline;gap:12px;margin:52px 0 18px;padding-bottom:9px;border-bottom:1px solid rgba(33,33,32,.14)}\n  .sechd .n{font:600 12px 'Fira Code',monospace;color:#fff;background:#866051;border-radius:5px;padding:3px 8px}\n  .sechd h2{font:600 18px 'Fira Sans',sans-serif;margin:0}\n  .sechd .m{margin-left:auto;font:400 11.5px 'Fira Code',monospace;color:#928b8b}\n  .note-p{font:400 12.5px/1.65 'Fira Sans',sans-serif;color:#5f5b5b;max-width:720px;margin:0 0 20px}\n  .rules{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:14px 32px;max-width:1000px}\n  .rules li{font:400 12.5px/1.55 'Fira Sans',sans-serif;color:#3f3b38;padding-left:16px;position:relative}\n  .rules li::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:#866051}\n  .rules b{color:#262626;font-weight:600}\n  .stateswrap{display:flex;flex-wrap:wrap;gap:26px}\n  .scap{font:400 11.5px/1.4 'Fira Sans',sans-serif;color:#5f5b5b;margin:8px 0 0;max-width:300px}\n  .scap b{color:#262626}\n  .indrow{display:flex;gap:32px;flex-wrap:wrap;align-items:flex-start}\n  .indcap{font:400 12px/1.55 'Fira Sans',sans-serif;color:#5f5b5b;max-width:300px}\n  .indcap b{color:#262626}\n\n  /* ---- dark app window (the subject) ---- */\n  .win{--rail:#242429;--railbd:#3a3a42;--ink:#c9c9cf;--mut:#7c7c85;--acc:#3d7fd6;--tile-bd:#45454d;\n       background:#1b1b1e;border:1px solid #34343a;border-radius:11px;overflow:hidden;box-shadow:0 18px 44px rgba(60,45,30,.22);position:relative}\n  .tbar{height:34px;display:flex;align-items:center;gap:12px;padding:0 12px;background:rgba(255,255,255,.045);border-bottom:1px solid rgba(255,255,255,.07)}\n  .dots{display:flex;gap:7px}\n  .dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.22)}\n  .tbtn{width:22px;height:18px;border:1px solid var(--railbd);border-radius:4px;display:grid;place-items:center;color:var(--mut);font:600 9px 'Fira Code',monospace}\n  .tbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}\n  .ttl{flex:1;text-align:center;font:500 11.5px 'Fira Code',monospace;color:var(--mut);letter-spacing:.02em}\n  .cv{position:relative;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:22px 22px;background-color:#1b1b1e}\n  .rail{position:absolute;display:flex;background:var(--rail);border:1px solid var(--railbd);border-radius:12px;padding:6px;gap:5px;box-shadow:0 6px 18px rgba(0,0,0,.25)}\n  .rail.vert{flex-direction:column}\n  .tool{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--ink);font:400 14px 'Fira Sans',sans-serif;opacity:.72}\n  .tool.on{background:var(--acc);color:#fff;opacity:1}\n  .rdiv{height:1px;background:var(--railbd);margin:2px 3px}\n  .tile{position:absolute;border:1px solid var(--tile-bd);border-radius:3px;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.045) 0 6px,transparent 6px 12px)}\n  .tile .tl{position:absolute;left:6px;bottom:5px;font:400 8.5px 'Fira Code',monospace;color:var(--mut)}\n  .chips{position:absolute;bottom:6px;right:6px;display:flex;gap:3px}\n  .chips span{width:20px;height:16px;border-radius:3px;background:rgba(61,127,214,.85);display:grid;place-items:center;color:#fff;font:400 10px 'Fira Sans',sans-serif}\n  .sel{outline:2px solid var(--acc);outline-offset:1px}\n  .charm{position:absolute;display:flex;gap:2px;background:var(--rail);border:1px solid var(--railbd);border-radius:10px;padding:5px;box-shadow:0 8px 20px rgba(0,0,0,.3)}\n  .cbtn{display:flex;flex-direction:column;align-items:center;gap:3px;width:38px;padding:3px 0;border-radius:6px}\n  .cbtn .g{width:22px;height:22px;border-radius:5px;border:1px solid var(--railbd);display:grid;place-items:center;color:var(--ink);font:400 12px 'Fira Sans',sans-serif}\n  .cbtn .c{font:400 7.5px 'Fira Code',monospace;color:var(--mut)}\n  .an{position:absolute;font:400 9.5px/1.4 'Fira Code',monospace;color:#3d7fd6;background:rgba(61,127,214,.1);border-left:2px solid #3d7fd6;padding:3px 6px;border-radius:0 4px 4px 0;max-width:180px;z-index:5}\n  .side{position:absolute;top:10px;bottom:10px;border-radius:10px;background:var(--rail);border:1px solid var(--railbd);display:flex;box-shadow:0 8px 24px rgba(0,0,0,.3)}\n  .icrail{width:40px;border-right:1px solid var(--railbd);display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 0}\n  .icrail .tool{width:26px;height:26px}\n  .spane{flex:1;padding:12px 13px;color:var(--ink);overflow:hidden}\n  .sh{font:600 11px 'Fira Code',monospace;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin:0 0 9px}\n  .line{height:8px;border-radius:3px;background:rgba(255,255,255,.09);margin:6px 0}\n  .lrow{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:6px}\n  .lthumb{width:26px;height:20px;border-radius:3px;border:1px solid var(--tile-bd);flex:none;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 5px,transparent 5px 10px)}\n  .ind{position:relative;width:158px;height:110px;border:1px solid var(--tile-bd);border-radius:3px;background:#1b1b1e;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 7px,transparent 7px 14px)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"doc\">\n  <div class=\"eyebrow\">Baseline UI Vision · v0.1 · 5 Jul 2026<\u002Fdiv>\n  <h1>Expanding Worlds<\u002Fh1>\n  <p class=\"sub\">A chromeless, floating-palette canvas — the shell we're building toward.<\u002Fp>\n  <p class=\"lead\">The window owns its chrome. A thin translucent strip holds only the traffic lights and a sidebar toggle; everything else is a floating palette over a near-full-bleed canvas. The board reads first as an art-reference surface, and structure — notes, sub-canvases, tags — accumulates only when useful. This page fixes the baseline direction; details expand as we build.<\u002Fp>\n  <div class=\"decos\">\n    <span class=\"chip\">Layout&nbsp;<b>1a<\u002Fb> — left tools · mirrored ops rail<\u002Fspan>\n    <span class=\"chip\">Skin&nbsp;<b>dark<\u002Fb> (paper alt deferred)<\u002Fspan>\n    <span class=\"chip\">Node marker&nbsp;<b>1h<\u002Fb> — overlay chips<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ===== SECTION A: THE SHELL ===== -->\n  <div class=\"sechd\"><span class=\"n\">A<\u002Fspan><h2>The shell<\u002Fh2><span class=\"m\">macOS lead · Windows parity<\u002Fspan><\u002Fdiv>\n  <p class=\"note-p\">Tools pinned left (Photoshop muscle memory), canvas ops + z-order mirrored right. Single-click selects and raises the charm bar; double-click opens whatever the node contains.<\u002Fp>\n  <div class=\"win\" style=\"width:1040px\">\n    <div class=\"tbar\">\n      <div class=\"dots\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fdiv>\n      <div class=\"tbtn\">☰<\u002Fdiv>\n      <div class=\"ttl\">Ashenvale › Home<\u002Fdiv>\n      <div class=\"tbtn\" style=\"opacity:.4\">⌕<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cv\" style=\"height:588px\">\n      <div class=\"rail vert\" style=\"left:14px;top:120px\">\n        <div class=\"tool on\">▹<\u002Fdiv><div class=\"tool\">▭<\u002Fdiv><div class=\"tool\">◯<\u002Fdiv><div class=\"tool\">╱<\u002Fdiv><div class=\"tool\">↗<\u002Fdiv><div class=\"tool\">⌇<\u002Fdiv><div class=\"tool\">T<\u002Fdiv><div class=\"tool\">✎<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rail vert\" style=\"right:14px;top:104px\">\n        <div class=\"tool\">+<\u002Fdiv><div class=\"tool\">−<\u002Fdiv><div class=\"tool\" style=\"font-size:9px\">FIT<\u002Fdiv>\n        <div class=\"rdiv\"><\u002Fdiv><div class=\"tool\">⤒<\u002Fdiv><div class=\"tool\">⤓<\u002Fdiv>\n        <div class=\"rdiv\"><\u002Fdiv><div class=\"tool\">▤<\u002Fdiv><div class=\"tool\">◫<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile\" style=\"left:168px;top:74px;width:180px;height:126px;transform:rotate(-3deg)\"><span class=\"tl\">forest.png<\u002Fspan><\u002Fdiv>\n      <div class=\"tile\" style=\"left:380px;top:58px;width:154px;height:212px;transform:rotate(2deg)\"><span class=\"tl\">tower.jpg<\u002Fspan><\u002Fdiv>\n      <div class=\"tile\" style=\"left:320px;top:340px;width:196px;height:132px\"><span class=\"tl\">map-sketch.png<\u002Fspan>\n        <div class=\"chips\"><span>✎<\u002Fspan><span>▤<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile\" style=\"left:590px;top:366px;width:138px;height:138px;transform:rotate(-2deg)\"><span class=\"tl\">crest.png<\u002Fspan>\n        <div class=\"chips\"><span>▤<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tile sel\" style=\"left:576px;top:136px;width:216px;height:150px\"><span class=\"tl\">keep-hall.jpg<\u002Fspan><\u002Fdiv>\n      <div class=\"charm\" style=\"left:576px;top:298px\">\n        <div class=\"cbtn\"><span class=\"g\">✎<\u002Fspan><span class=\"c\">note<\u002Fspan><\u002Fdiv>\n        <div class=\"cbtn\"><span class=\"g\">▤<\u002Fspan><span class=\"c\">canvas<\u002Fspan><\u002Fdiv>\n        <div class=\"cbtn\"><span class=\"g\">⌗<\u002Fspan><span class=\"c\">crop<\u002Fspan><\u002Fdiv>\n        <div class=\"cbtn\"><span class=\"g\">⇋<\u002Fspan><span class=\"c\">flip<\u002Fspan><\u002Fdiv>\n        <div class=\"cbtn\"><span class=\"g\">⌫<\u002Fspan><span class=\"c\">delete<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"an\" style=\"left:52px;top:6px;max-width:150px\">strip: traffic lights + sidebar toggle only<\u002Fdiv>\n      <div class=\"an\" style=\"left:14px;top:420px\">TOOLS — select · shapes · line · arrow · connector · text · pen<\u002Fdiv>\n      <div class=\"an\" style=\"right:56px;top:320px\">OPS — zoom · fit · order · align (mirror rail)<\u002Fdiv>\n      <div class=\"an\" style=\"left:576px;top:466px;max-width:170px\">1-click → charm bar · 2-click → opens contained canvas / note<\u002Fdiv>\n      <div class=\"an\" style=\"left:322px;top:316px;max-width:150px\">chips = holds note + canvas<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SECTION B: PRINCIPLES ===== -->\n  <div class=\"sechd\"><span class=\"n\">B<\u002Fspan><h2>Principles<\u002Fh2><\u002Fdiv>\n  <ul class=\"rules\">\n    <li><b>Own the chrome.<\u002Fb> Frameless window; we draw the traffic lights + sidebar toggle. No OS title bar, no menu strip.<\u002Fli>\n    <li><b>Thin by default.<\u002Fb> Resting state is just canvas + two floating rails. Panels appear on intent, never persistent walls.<\u002Fli>\n    <li><b>Palettes float.<\u002Fb> Tools and ops are capsules over the canvas, not docked chrome. The sidebar's icon rail rides its inner edge.<\u002Fli>\n    <li><b>One sidebar, switched.<\u002Fb> Obsidian-style icon rail flips the same panel between note · data · tags · search.<\u002Fli>\n    <li><b>Charm bar on select.<\u002Fb> Single-click raises: note · canvas · crop · flip · delete. Contextual to the node.<\u002Fli>\n    <li><b>Double-click opens.<\u002Fb> Navigates into the sub-canvas, opens the note in the sidebar, or both.<\u002Fli>\n    <li><b>Content is legible at rest.<\u002Fb> Overlay chips mark what a node holds without a click.<\u002Fli>\n    <li><b>Quiet motion.<\u002Fb> Sidebar ~0.2s, selection ~0.15s, plain ease. Nothing bobs for attention.<\u002Fli>\n  <\u002Ful>\n\n  <!-- ===== SECTION C: KEY STATES ===== -->\n  <div class=\"sechd\"><span class=\"n\">C<\u002Fspan><h2>Key states<\u002Fh2><\u002Fdiv>\n  <div class=\"stateswrap\">\n    <div>\n      <div class=\"win\" style=\"width:472px\">\n        <div class=\"tbar\"><div class=\"dots\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fdiv><div class=\"tbtn\">☰<\u002Fdiv><div class=\"ttl\">New World › Home<\u002Fdiv><\u002Fdiv>\n        <div class=\"cv\" style=\"height:296px\">\n          <div class=\"rail vert\" style=\"left:12px;top:40px\"><div class=\"tool on\">▹<\u002Fdiv><div class=\"tool\">▭<\u002Fdiv><div class=\"tool\">◯<\u002Fdiv><div class=\"tool\">T<\u002Fdiv><div class=\"tool\">✎<\u002Fdiv><\u002Fdiv>\n          <div class=\"rail vert\" style=\"right:12px;top:40px\"><div class=\"tool\">+<\u002Fdiv><div class=\"tool\">−<\u002Fdiv><div class=\"tool\" style=\"font-size:8px\">FIT<\u002Fdiv><\u002Fdiv>\n          <div class=\"an\" style=\"left:50%;top:128px;transform:translateX(-50%);max-width:180px;text-align:center\">drop an image anywhere to begin<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"scap\"><b>Resting.<\u002Fb> Empty canvas, chrome + two rails only. The thin default.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div class=\"win\" style=\"width:472px\">\n        <div class=\"tbar\"><div class=\"dots\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fdiv><div class=\"tbtn on\">☰<\u002Fdiv><div class=\"ttl\">Ashenvale › Home<\u002Fdiv><\u002Fdiv>\n        <div class=\"cv\" style=\"height:296px\">\n          <div class=\"side\" style=\"left:10px;width:252px\">\n            <div class=\"icrail\"><div class=\"tool on\" style=\"background:var(--acc);color:#fff\">✎<\u002Fdiv><div class=\"tool\">▦<\u002Fdiv><div class=\"tool\">#<\u002Fdiv><div class=\"tool\">⌕<\u002Fdiv><\u002Fdiv>\n            <div class=\"spane\">\n              <p class=\"sh\">Note<\u002Fp>\n              <div class=\"line\" style=\"width:70%;height:11px;background:var(--acc);opacity:.5\"><\u002Fdiv>\n              <div class=\"line\" style=\"width:100%\"><\u002Fdiv><div class=\"line\" style=\"width:92%\"><\u002Fdiv><div class=\"line\" style=\"width:60%\"><\u002Fdiv>\n              <div class=\"line\" style=\"width:96%\"><\u002Fdiv><div class=\"line\" style=\"width:40%;background:rgba(61,127,214,.4)\"><\u002Fdiv>\n              <div class=\"line\" style=\"width:84%\"><\u002Fdiv><div class=\"line\" style=\"width:66%\"><\u002Fdiv>\n              <div class=\"line\" style=\"width:50%;margin-top:14px;background:rgba(61,127,214,.4)\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rail vert\" style=\"right:12px;top:40px\"><div class=\"tool\">+<\u002Fdiv><div class=\"tool\">−<\u002Fdiv><\u002Fdiv>\n          <div class=\"tile sel\" style=\"left:300px;top:58px;width:132px;height:98px\"><span class=\"tl\">keep.jpg<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"scap\"><b>Sidebar — note.<\u002Fb> Floating panel; icon rail on its inner edge. Wiki-links tinted. Canvas shifts, doesn't resize.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div class=\"win\" style=\"width:472px\">\n        <div class=\"tbar\"><div class=\"dots\"><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><span class=\"dot\"><\u002Fspan><\u002Fdiv><div class=\"tbtn on\">☰<\u002Fdiv><div class=\"ttl\">Ashenvale › Home<\u002Fdiv><\u002Fdiv>\n        <div class=\"cv\" style=\"height:296px\">\n          <div class=\"side\" style=\"left:10px;width:264px\">\n            <div class=\"icrail\"><div class=\"tool\">✎<\u002Fdiv><div class=\"tool on\" style=\"background:var(--acc);color:#fff\">▦<\u002Fdiv><div class=\"tool\">#<\u002Fdiv><div class=\"tool\">⌕<\u002Fdiv><\u002Fdiv>\n            <div class=\"spane\">\n              <p class=\"sh\">Node library<\u002Fp>\n              <div style=\"display:flex;gap:5px;margin-bottom:10px\"><span style=\"font:500 8.5px 'Fira Code',monospace;color:#fff;background:var(--acc);padding:3px 7px;border-radius:999px\">All<\u002Fspan><span style=\"font:500 8.5px 'Fira Code',monospace;color:var(--mut);border:1px solid var(--railbd);padding:3px 7px;border-radius:999px\">Unplaced<\u002Fspan><span style=\"font:500 8.5px 'Fira Code',monospace;color:var(--mut);border:1px solid var(--railbd);padding:3px 7px;border-radius:999px\">Tagged<\u002Fspan><\u002Fdiv>\n              <div class=\"lrow\"><span class=\"lthumb\"><\u002Fspan><div style=\"flex:1\"><div class=\"line\" style=\"width:70%;margin:0\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div class=\"lrow\"><span class=\"lthumb\"><\u002Fspan><div style=\"flex:1\"><div class=\"line\" style=\"width:52%;margin:0\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div class=\"lrow\"><span class=\"lthumb\"><\u002Fspan><div style=\"flex:1\"><div class=\"line\" style=\"width:80%;margin:0\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div class=\"lrow\"><span class=\"lthumb\"><\u002Fspan><div style=\"flex:1\"><div class=\"line\" style=\"width:44%;margin:0\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rail vert\" style=\"right:12px;top:40px\"><div class=\"tool\">+<\u002Fdiv><div class=\"tool\">−<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"scap\"><b>Sidebar — data.<\u002Fb> Same panel, node library. Unplaced filter keeps stray nodes findable; a row highlights its placements.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SECTION D: NODE MARKER ===== -->\n  <div class=\"sechd\"><span class=\"n\">D<\u002Fspan><h2>Node content marker<\u002Fh2><span class=\"m\">variant 1h<\u002Fspan><\u002Fdiv>\n  <p class=\"note-p\">Translucent glyph chips at the bottom-right corner — literal and scannable at rest, no click required. Note = pen, canvas = board. A node shows one or both; a bare image shows none.<\u002Fp>\n  <div class=\"indrow\">\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <div class=\"ind\"><div class=\"chips\"><span>✎<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <span class=\"indcap\"><b>Note only.<\u002Fb> Has shared prose, no sub-canvas.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <div class=\"ind\"><div class=\"chips\"><span>▤<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <span class=\"indcap\"><b>Canvas only.<\u002Fb> A doorway into another board.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <div class=\"ind\"><div class=\"chips\"><span>✎<\u002Fspan><span>▤<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <span class=\"indcap\"><b>Both.<\u002Fb> Double-click opens the sub-canvas and the note together.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <div class=\"ind\"><\u002Fdiv>\n      <span class=\"indcap\"><b>Bare.<\u002Fb> Image node with no attached meaning yet — most nodes start here.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER ===== -->\n  <div class=\"sechd\"><span class=\"n\">·<\u002Fspan><h2>Expand later<\u002Fh2><\u002Fdiv>\n  <p class=\"note-p\" style=\"margin-bottom:0\">Deferred for now, holding shape: the warm-paper alternate skin · crop/background edit modes · tag query views · quick-open over notes &amp; canvases · align/distribute affordances on the ops rail · the \"lit charm\" indicator as a secondary cue. Nothing here is locked past the shell — it's the mental model to build against.<\u002Fp>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
