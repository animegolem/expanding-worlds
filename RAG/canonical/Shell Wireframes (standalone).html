">note<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">viz<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">wiki<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-note\" style=\"font-size:11px\">Note title ——<br>~~~~~ ~~~ ~~~~<br>~~ [[link]] ~~~~~<br>~~~~~ ~~<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:150px;top:246px;width:220px\">sidebar = free-floating window INSIDE the canvas, drag anywhere, remembers spot<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Purest PureRef read. No bars at all; traffic lights live in the hover strip too. Sidebar is a floating panel with its own mini chrome. Win/Linux: the hover strip gains a ☰ menu.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1b WHISPER BAR -->\n    <div class=\"dv-opt\" id=\"1b\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1b\">1b<\u002Fa>Whisper bar — translucent top bar, always there but nearly invisible<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div class=\"wf-win\" style=\"width:446px;height:300px;margin:12px\">\n          <div class=\"wf-canvas\"><\u002Fdiv>\n          <!-- persistent whisper bar -->\n          <div style=\"position:absolute;left:0;top:0;right:0;height:24px;background:rgba(0,0,0,.05);display:flex;align-items:center;padding:0 10px;gap:10px\">\n            <span class=\"wf-lights\" style=\"position:static\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n            <span style=\"font:9px ui-monospace,monospace;color:#999\">— board title —<\u002Fspan>\n            <span style=\"margin-left:auto;font:10px ui-monospace,monospace;color:#666\">▤ ◫ ⌕<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:120px;top:26px;width:190px\">bar is ~15% opacity; hover ⇒ full opacity + file/view menus appear<\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:200px;top:80px;width:90px;height:118px\"><span>img<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:305px;top:130px;width:70px;height:90px\"><span>img<\u002Fspan><\u002Fdiv>\n          <!-- docked sidebar -->\n          <div style=\"position:absolute;left:0;top:24px;bottom:0;width:150px;background:#fff;border-right:1.5px solid #2b2b2b;padding:6px\">\n            <div style=\"display:flex;gap:4px;margin-bottom:4px\">\n              <div class=\"wf-tool on\" style=\"width:auto;padding:0 5px;height:16px\">note<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">viz<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">wiki<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-note\" style=\"font-size:11px\">Note title ——<br>~~~~ ~~~~~ ~~<br>~~ [[link]] ~~~<br>~~~~~<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:156px;top:236px;width:130px\">docked panel slides in/out; canvas shifts (Obsidian-like)<\u002Fdiv>\n          <!-- palettes -->\n          <div class=\"wf-panel\" style=\"left:158px;top:70px;width:28px;padding:4px;display:flex;flex-direction:column;gap:4px;align-items:center\">\n            <div class=\"wf-tool on\">▸<\u002Fdiv><div class=\"wf-tool\">T<\u002Fdiv><div class=\"wf-tool\">▢<\u002Fdiv><div class=\"wf-tool\">✎<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-panel\" style=\"right:8px;top:96px;width:28px;padding:4px;display:flex;flex-direction:column;gap:4px;align-items:center\">\n            <div class=\"wf-tool\">+<\u002Fdiv><div class=\"wf-tool\">−<\u002Fdiv><div class=\"wf-tool\">⌖<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">A real (thin) bar solves Win/Linux menus honestly and gives drag-to-move everywhere. It just refuses to be visible until you look at it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1c CORNER CHARMS -->\n    <div class=\"dv-opt\" id=\"1c\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1c\">1c<\u002Fa>Corner charms — traffic lights + icon cluster only, sidebar overlays<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div class=\"wf-win\" style=\"width:446px;height:300px;margin:12px\">\n          <div class=\"wf-canvas\"><\u002Fdiv>\n          <span class=\"wf-lights\" style=\"left:10px;top:10px\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n          <div style=\"position:absolute;right:10px;top:8px;display:flex;gap:4px\">\n            <div class=\"wf-tool\">◫<\u002Fdiv><div class=\"wf-tool\">⌕<\u002Fdiv><div class=\"wf-tool\">☰<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"right:14px;top:34px;width:120px\">only fixed chrome: 3 charms. ☰ holds file/view (esp. win/nix)<\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:120px;top:66px;width:92px;height:120px\"><span>img<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:228px;top:110px;width:74px;height:92px\"><span>img<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:150px;top:200px;width:66px;height:80px\"><span>img<\u002Fspan><\u002Fdiv>\n          <!-- overlay sheet sidebar -->\n          <div class=\"wf-panel\" style=\"right:6px;top:36px;width:158px;height:230px;padding:6px;background:rgba(255,255,255,.92)\">\n            <div style=\"display:flex;gap:4px;margin-bottom:4px\">\n              <div class=\"wf-tool on\" style=\"width:auto;padding:0 5px;height:16px\">note<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">viz<\u002Fdiv>\n              <div class=\"wf-tool\" style=\"width:auto;padding:0 5px;height:16px\">wiki<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-note\" style=\"font-size:11px\">Note title ——<br>~~~~ ~~~~~ ~~~~<br>~~~ [[link]] ~~<br>~~~~ ~~~<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:250px;top:272px;width:180px\">sidebar OVERLAYS canvas (no reflow) — slides from the ◫ charm, semi-translucent<\u002Fdiv>\n          <div class=\"wf-panel\" style=\"left:8px;top:88px;width:28px;padding:4px;display:flex;flex-direction:column;gap:4px;align-items:center\">\n            <div class=\"wf-tool on\">▸<\u002Fdiv><div class=\"wf-tool\">T<\u002Fdiv><div class=\"wf-tool\">▢<\u002Fdiv><div class=\"wf-tool\">✎<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Middle ground: canvas never reflows, chrome is 3 icons + lights. Overlay sidebar keeps spatial memory of the board intact.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1d DECK RAIL -->\n    <div class=\"dv-opt\" id=\"1d\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1d\">1d<\u002Fa>Deck rail — spine of mode tabs on the edge, tools in a bottom dock<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div class=\"wf-win\" style=\"width:446px;height:300px;margin:12px\">\n          <div class=\"wf-canvas\"><\u002Fdiv>\n          <span class=\"wf-lights\" style=\"left:10px;top:10px\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n          <!-- spine rail -->\n          <div style=\"position:absolute;left:0;top:34px;bottom:0;width:22px;background:#fff;border-right:1.5px solid #2b2b2b;display:flex;flex-direction:column;gap:8px;align-items:center;padding-top:10px\">\n            <span style=\"font:9px ui-monospace,monospace;writing-mode:vertical-rl;color:#2a78d6;font-weight:700\">NOTE<\u002Fspan>\n            <span style=\"font:9px ui-monospace,monospace;writing-mode:vertical-rl;color:#888\">WIKI<\u002Fspan>\n            <span style=\"font:9px ui-monospace,monospace;writing-mode:vertical-rl;color:#888\">VIZ<\u002Fspan>\n            <span style=\"font:9px ui-monospace,monospace;writing-mode:vertical-rl;color:#888\">FILES<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:28px;top:40px;width:140px\">book-spine rail, ~22px. Click a label ⇒ that panel unfolds<\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:150px;top:56px;width:92px;height:118px\"><span>img<\u002Fspan><\u002Fdiv>\n          <div class=\"wf-img\" style=\"left:258px;top:100px;width:72px;height:92px\"><span>img<\u002Fspan><\u002Fdiv>\n          <!-- bottom dock -->\n          <div class=\"wf-panel\" style=\"left:50%;transform:translateX(-50%);bottom:8px;padding:4px 6px;display:flex;gap:5px\">\n            <div class=\"wf-tool on\">▸<\u002Fdiv><div class=\"wf-tool\">T<\u002Fdiv><div class=\"wf-tool\">▢<\u002Fdiv><div class=\"wf-tool\">✎<\u002Fdiv><div class=\"wf-tool\">↗<\u002Fdiv><div class=\"wf-tool\">⧉<\u002Fdiv>\n            <div style=\"width:1px;background:#ccc\"><\u002Fdiv>\n            <div class=\"wf-tool\">+<\u002Fdiv><div class=\"wf-tool\">−<\u002Fdiv><div class=\"wf-tool\">⌖<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:120px;bottom:44px;width:210px\">one macOS-dock-style strip: tools left of divider, view controls right. Fades when drawing.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Novel-ish: sidebar modes become a physical spine (wiki/book metaphor fits the campaign-bible fantasy). Single bottom dock instead of two edge palettes.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1e IN-WORLD SATELLITE -->\n    <div class=\"dv-opt\" id=\"1e\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1e\">1e<\u002Fa>In-world satellite — the note panel attaches to the node, in canvas space<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div class=\"wf-win\" style=\"width:446px;height:300px;margin:12px\">\n          <div class=\"wf-canvas\"><\u002Fdiv>\n          <span class=\"wf-lights wf-ghost\" style=\"left:10px;top:10px\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n          <div class=\"wf-img wf-sel\" style=\"left:96px;top:80px;width:92px;height:120px\"><span>img<\u002Fspan><\u002Fdiv>\n          <!-- tether + satellite panel -->\n          <div style=\"position:absolute;left:188px;top:120px;width:34px;border-top:1.5px dashed #2a78d6\"><\u002Fdiv>\n          <div class=\"wf-panel\" style=\"left:222px;top:64px;width:160px;height:160px;padding:6px;border-color:#2a78d6\">\n            <div class=\"wf-note\" style=\"font-size:11px;color:#1a1a1a\">Note title ——<br>~~~~ ~~~~~ ~~<br>~~ [[link]] ~~~<br>~~~~~ ~~~~<\u002Fdiv>\n            <div style=\"position:absolute;bottom:5px;right:6px;font:8.5px ui-monospace,monospace;color:#2a78d6\">⇱ pop to sidebar<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-arrow\" style=\"left:230px;top:232px;width:190px\">double-click a node ⇒ its note opens TETHERED beside it, pans/zooms with the board. One click pops it into a classic docked sidebar if you want it fixed.<\u002Fdiv>\n          <!-- cmd k -->\n          <div class=\"wf-panel\" style=\"left:50%;transform:translateX(-50%);top:10px;width:180px;height:22px;display:flex;align-items:center;padding:0 8px\">\n            <span style=\"font:9.5px ui-monospace,monospace;color:#888\">⌘K — search / commands / create…<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"wf-panel\" style=\"left:8px;top:96px;width:28px;padding:4px;display:flex;flex-direction:column;gap:4px;align-items:center\">\n            <div class=\"wf-tool on\">▸<\u002Fdiv><div class=\"wf-tool\">T<\u002Fdiv><div class=\"wf-tool\">▢<\u002Fdiv><div class=\"wf-tool\">✎<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Most novel: notes live in the world next to their nodes — spatial memory does the filing. Chrome is nearly nil; ⌘K carries commands, menus hover-reveal.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1f SELECTION + CHARM BAR -->\n    <div class=\"dv-opt\" id=\"1f\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1f\">1f<\u002Fa>Selection states + charm bar (applies to any shell above)<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div style=\"display:flex;gap:10px;padding:12px\">\n          <div class=\"wf-win\" style=\"width:136px;height:190px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img\" style=\"left:30px;top:34px;width:74px;height:98px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:32px;top:138px\">hover: faint edge glow only<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-win\" style=\"width:136px;height:190px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img wf-sel\" style=\"left:30px;top:24px;width:74px;height:98px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div class=\"wf-panel\" style=\"left:22px;top:128px;width:92px;height:18px;display:flex;align-items:center;justify-content:space-around;font:9px ui-monospace,monospace;color:#333\">✂ ⇋ ⇵ ⧉ ✎ 🔒<\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:14px;top:152px;width:110px\">1-click: charm bar under it — crop · flipH · flipV · make-canvas · note · lock<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-win\" style=\"width:136px;height:190px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img\" style=\"left:30px;top:24px;width:74px;height:98px;outline:2.5px solid #c2551f;outline-offset:2px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:14px;top:132px;width:112px;color:#c2551f\">2-click: opens note ⇒ node keeps a distinct “note is open” border while its note shows in the sidebar<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Three states: hover / selected+charms / note-open. No handles drawn in idle states — the cursor does that work (see <a class=\"dv-oid\" href=\"#1g\">1g<\u002Fa>). Border treatments for note-open explored in <a class=\"dv-oid\" href=\"#1h\">1h<\u002Fa>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1g CURSOR SPEC -->\n    <div class=\"dv-opt\" id=\"1g\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1g\">1g<\u002Fa>Cursor zones — no drawn handles, the cursor IS the affordance<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div style=\"padding:14px;display:flex;gap:14px\">\n          <div style=\"position:relative;width:210px;height:250px;flex:none\">\n            <div class=\"wf-img wf-sel\" style=\"left:44px;top:44px;width:120px;height:160px;position:absolute\"><span>img<\u002Fspan><\u002Fdiv>\n            <!-- zone annotations -->\n            <div class=\"wf-hint\" style=\"left:80px;top:110px;color:#333\">inside: ✥ move<\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:170px;top:114px\">edge ±4px: ⇔ resize<\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:150px;top:24px\">corner: ⤡ resize<\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:6px;top:16px;color:#c2551f\">just OUTSIDE corner: ↻ rotate<\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:6px;top:230px;color:#888\">empty canvas: grab/pan<\u002Fdiv>\n            <div style=\"position:absolute;left:36px;top:36px;width:136px;height:176px;border:1px dashed #c2551f;border-radius:6px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-note\" style=\"flex:1\">\n            Zones, not handles:<br>\n            · inside ⇒ move cursor<br>\n            · within 4px of edge ⇒ directional resize (⇕ ⇔)<br>\n            · corner ⇒ diagonal resize (⤡ ⤢)<br>\n            · 4–14px OUTSIDE a corner ⇒ rotate cursor ↻<br>\n            · ⌥ inside ⇒ duplicate-drag<br>\n            · locked node ⇒ 🚫 cursor, no state to draw<br>\n            <br>\n            Selected = thin blue outline only. Zero knobs cluttering the art.\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">Matches your instinct: kill the stick-out rotate handle; hot zones + cursor glyphs communicate everything. Snappy because nothing has to render.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1h NOTE-OPEN BORDER -->\n    <div class=\"dv-opt\" id=\"1h\">\n      <div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1h\">1h<\u002Fa>“Note open in sidebar” indicator — three treatments<\u002Fdiv>\n      <div class=\"dv-card\" style=\"width:470px\">\n        <div style=\"display:flex;gap:10px;padding:12px\">\n          <div class=\"wf-win\" style=\"width:136px;height:170px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img\" style=\"left:30px;top:26px;width:74px;height:98px;outline:2.5px solid #c2551f;outline-offset:3px;border-radius:2px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:16px;top:136px;width:106px;color:#c2551f\">A · accent halo, second color ≠ selection blue<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-win\" style=\"width:136px;height:170px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img\" style=\"left:30px;top:26px;width:74px;height:98px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div style=\"position:absolute;left:96px;top:18px;width:16px;height:22px;background:#c2551f;clip-path:polygon(0 0,100% 0,100% 100%,50% 75%,0 100%)\"><\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:16px;top:136px;width:106px;color:#c2551f\">B · bookmark tab on the corner (reads at any zoom)<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-win\" style=\"width:136px;height:170px;position:relative;box-shadow:none\">\n            <div class=\"wf-canvas\"><\u002Fdiv>\n            <div class=\"wf-img\" style=\"left:14px;top:26px;width:70px;height:94px\"><span>img<\u002Fspan><\u002Fdiv>\n            <div style=\"position:absolute;left:84px;top:60px;width:40px;border-top:1.5px dashed #c2551f\"><\u002Fdiv>\n            <div style=\"position:absolute;right:2px;top:16px;bottom:16px;width:12px;background:#fff;border:1.5px solid #c2551f;border-radius:3px\"><\u002Fdiv>\n            <div class=\"wf-hint\" style=\"left:14px;top:132px;width:110px;color:#c2551f\">C · thread line from node to the sidebar edge — literal “this one”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-cap\">All three keep selection-blue free for actual selection. A is cheapest; B survives zoom-out best; C is charming but needs care when the node is off-screen.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <p class=\"dv-next\">Try next: “combine <a class=\"dv-oid\" href=\"#1b\">1b<\u002Fa>'s whisper bar with <a class=\"dv-oid\" href=\"#1c\">1c<\u002Fa>'s overlay sidebar” · “go deeper on <a class=\"dv-oid\" href=\"#1e\">1e<\u002Fa>'s tethered notes” · “wireframe the tool flyout + charm bar interactions frame by frame”<\u002Fp>\n<\u002Fsection>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
