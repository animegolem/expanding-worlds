document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b030d109-3c49-47d3-bd91-ffb262bd92c7\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<style>\nbody{margin:0}\ndoc-page:not(:defined){visibility:hidden}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" from=\"00371410-8cbe-4977-9dea-c326280c1216#/doc-page.js\" size=\"letter\" margin=\"0.85in\" hint-size=\"100%,1200px\">\n\n<h1 style=\"font-size:26px;margin:0 0 4px;letter-spacing:-.01em\">Expanding Worlds — UI &amp; Interaction Design Spec<\u002Fh1>\n<p style=\"margin:0 0 8px;font-size:13px;color:#777\">v2 · July 2026 · Supersedes v1 and both reply letters; consolidates wireframe turns 1–14. Written to live in the repo beside RFC-0001 (rev 0.19). Where this document and any earlier artifact disagree, this document wins.<\u002Fp>\n<p style=\"margin:0 0 24px;font-size:13.5px;line-height:1.6;color:#555;border-left:3px solid #ddd;padding-left:12px\"><i>Motivation, the sentence that decides our calls: the app is PureRef until you learn it nests; the global views are the user consenting to act against the database; the payoff moment is \"wait — THAT'S what I've been building?\" The target user is the person who has that moment.<\u002Fi><\u002Fp>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">0 · Design stance<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>The window is the board. Chrome is minimal, floating, and never causes canvas reflow. Neutrality is the product: the tool gets out of the way of the art.<\u002Fli>\n  <li>Mac is the lead platform; Windows/Linux gain a <code>☰<\u002Fcode> menu entry point, no other divergence. Glass theme is Mac-only (falls back to dark).<\u002Fli>\n  <li><b>One physics rule: panels grow out of the control you pressed<\u002Fb> — charms, links, menu items, rail icons all open panels anchored to themselves.<\u002Fli>\n  <li>Nothing has invisible state. Every grouping, link, mode, or ongoing condition is visible on some surface.<\u002Fli>\n  <li>Opinions ship as defaults, not settings (§9). Numeric thresholds herein are provisional feel numbers.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">1 · Shell layout<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li><b>Traffic lights<\u002Fb> upper-left. Beside them, the <b>navigation path<\u002Fb> (§2).<\u002Fli>\n  <li><b>Mode charm rail<\u002Fb>, vertical, upper-right: project <code>⧉<\u002Fcode> · search <code>⌕<\u002Fcode> · graph <code>⊛<\u002Fcode> · gallery <code>⊞<\u002Fcode> · outline <code>▤<\u002Fcode> · menu <code>☰<\u002Fcode>. Ongoing-condition charm appends below when present (§8).<\u002Fli>\n  <li><b>Dock<\u002Fb>, bottom-center: select · text · shape (press-hold flyout) · draw · line · arrow · connector · pin <code>◉<\u002Fcode> · divider · zoom out · % · zoom in · fit. Layer send-forward/back join only while a selection exists.<\u002Fli>\n  <li><b>No docked sidebar, no status strip, no tab bar.<\u002Fb> Transient errors are toasts; ongoing conditions per §8; multi-board work per §2.<\u002Fli>\n  <li><b>Title strip<\u002Fb> (file/view menus, Win/Linux) is hover-revealed at the top edge.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">2 · Navigation (RFC §8.1 chrome)<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li><b>Path, upper-left:<\u002Fb> renders the <b>entry route<\u002Fb> (a rendered back-stack), not structural ancestry — containment is a graph with legal cycles and no canonical parent. Clicking a crumb goes back to that board with viewport restored.<\u002Fli>\n  <li><b>⌂ Home<\u002Fb> is its own button at the path's head → root canvas.<\u002Fli>\n  <li><b>Back/forward:<\u002Fb> primarily gestures — trackpad swipe, mouse 4/5, <code>⌘[<\u002Fcode> / <code>⌘]<\u002Fcode>. Hover-revealed ‹ › beside the path; no permanent buttons.<\u002Fli>\n  <li><b>Bookmarks:<\u002Fb> a tiny map-pin button (cap-height circle-dot, generous hit target) at the path's tail. On press it <b>morphs into a teardrop<\u002Fb> pointing at the menu it opens — the button is its own anchor tail. Menu rows: drag-handle · name · printed shortcut · ✕. <b>Drag order is the ⌘1–n binding.<\u002Fb> Stale targets grey out with an \"in trash\" label, never silently vanish. Bottom row: \"＋ bookmark this board\".<\u002Fli>\n  <li>Cross-board flights (uses rows, tag rows, pinned-panel origin labels, graph clicks) are navigation events and enter history.<\u002Fli>\n  <li>Deferred: hold-⌘ switcher HUD; New Window for side-by-side (deferred, not a non-goal).<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">3 · Chrome visibility (engagement cadence)<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li><b>Engaged<\u002Fb> (cursor in window): all chrome visible; node charms ~70% opacity — a glanceable census of which nodes have content, never gated on hovering.<\u002Fli>\n  <li><b>Idle<\u002Fb> (cursor out, or ~4s still): the whole chrome layer — dock, rail, path, charms — fades on one shared clock. The board becomes wallpaper.<\u002Fli>\n  <li><b>Charm hover:<\u002Fb> that charm alone lights to 100% + pointer. No node-hover reveal state exists.<\u002Fli>\n  <li>Node charms hide when the node's <b>rendered screen size<\u002Fb> drops below a threshold (not zoom %).<\u002Fli>\n  <li>Transient offers (§7) ride this fade: ignoring them is the dismissal gesture.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">4 · Nodes: charms, selection, cursor<\u002Fh2>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">4.1 Content-hint charms<\u002Fh3>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Two glyphs: <b>page<\u002Fb> = has a note · <b>frame<\u002Fb> = has a nested canvas. At most one of each, side-by-side (never stacked), inset ~4px <b>inside<\u002Fb> the image corner, lower-right (corner is a setting). Subtle scrim chip for legibility; art reads through.<\u002Fli>\n  <li>The title below the image never collides with charms. Charms are UI, not pixels — excluded from crop/flip previews and exports.<\u002Fli>\n  <li>The canvas is a node: a screen-fixed corner charm (lower-left) is the current canvas's page charm — ghost <code>+<\u002Fcode> on cursor approach when empty, solid when the note exists.<\u002Fli>\n<\u002Ful>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">4.2 Click grammar<\u002Fh3>\n<table style=\"border-collapse:collapse;font-size:13.5px;line-height:1.5;margin:0 0 10px;width:100%\">\n  <tbody><tr style=\"border-bottom:1.5px solid #333\"><th style=\"text-align:left;padding:6px 10px 6px 0\">Target<\u002Fth><th style=\"text-align:left;padding:6px 10px\">Gesture<\u002Fth><th style=\"text-align:left;padding:6px 0\">Result<\u002Fth><\u002Ftr>\n  <tr style=\"border-bottom:1px solid #ddd\"><td style=\"padding:6px 10px 6px 0\">image<\u002Ftd><td style=\"padding:6px 10px\">click<\u002Ftd><td style=\"padding:6px 0\">select + charm bar<\u002Ftd><\u002Ftr>\n  <tr style=\"border-bottom:1px solid #ddd\"><td style=\"padding:6px 10px 6px 0\">page charm<\u002Ftd><td style=\"padding:6px 10px\">click<\u002Ftd><td style=\"padding:6px 0\">note pops in tethered; current canvas unchanged<\u002Ftd><\u002Ftr>\n  <tr style=\"border-bottom:1px solid #ddd\"><td style=\"padding:6px 10px 6px 0\">frame charm<\u002Ftd><td style=\"padding:6px 10px\">click<\u002Ftd><td style=\"padding:6px 0\">dive into the nested canvas only<\u002Ftd><\u002Ftr>\n  <tr><td style=\"padding:6px 10px 6px 0\">image<\u002Ftd><td style=\"padding:6px 10px\">double-click<\u002Ftd><td style=\"padding:6px 0\">everything: dive AND the canvas's note opens from its corner charm. Note-only ⇒ note; canvas-only ⇒ dive<\u002Ftd><\u002Ftr>\n<\u002Ftbody><\u002Ftable>\n<p style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px\">Charms are the exploded view of double-click; nothing to memorize.<\u002Fp>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">4.3 Selection + charm bar<\u002Fh3>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Selection = thin accent outline. No drawn handles, ever.<\u002Fli>\n  <li>Charm bar beneath the selection: crop · flip H · flip V · divider · make-canvas · note · tags <code>#<\u002Fcode> · lock. <code>#<\u002Fcode> pops the node's tag chips; a chip opens the tag panel (§6).<\u002Fli>\n<\u002Ful>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">4.4 Cursor zones<\u002Fh3>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Inside ⇒ move · edge ±4px ⇒ directional resize · corner ⇒ diagonal resize · 4–14px outside a corner ⇒ rotate · empty canvas ⇒ pan. <code>⌥<\u002Fcode>-drag duplicates; locked ⇒ 🚫. The cursor is the affordance; nothing renders on the node.<\u002Fli>\n<\u002Ful>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">4.5 The pin tool (closes RFC Q20)<\u002Fh3>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Dock tool <code>◉<\u002Fcode>, shortcut N: click places a dot node with its phantom note open and focused — type to persist, Esc and it never existed. Same teardrop as the bookmark button: <b>pins mean places, everywhere<\u002Fb>. The Create Pin dialog retires.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">5 · Notes and panels<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Notes open as <b>tethered panels<\u002Fb> beside their node; a dashed tail marks the attachment. The panel tracks its node as the camera pans; chrome and type stay screen-scale.<\u002Fli>\n  <li><b>One tethered panel at a time<\u002Fb> — opening another replaces it. <b>Pinned panels accumulate<\u002Fb> (⇱ converts). Tethered is a glance; pinning is a commitment. No auto-unpin, ever.<\u002Fli>\n  <li><b>Phantom lifecycle:<\u002Fb> empty editor persists nothing until the first keystroke; the hint charm turns solid at that moment.<\u002Fli>\n  <li>Tag chips at the top of a note panel are <b>the subject node's tags<\u002Fb>; zero-node notes show none.<\u002Fli>\n  <li>Note panel header always shows <b>⌖ n places<\u002Fb> — click unfolds the <b>uses list<\u002Fb> in-panel: rows grouped by canvas, Unplaced group last, \"here\" marking the placement being read (RFC §7.4).<\u002Fli>\n  <li><b>Wiki-link following is text-first<\u002Fb> (RFC §7.3): zero placements ⇒ inline notice at the link (\"no placements — open note?\" → loose-note panel); one ⇒ fly there AND the note opens tethered at the destination (anchors to the clicked link until spatial resolution lands, then re-tethers); many ⇒ <b>location chooser<\u002Fb> panel anchored to the clicked link.<\u002Fli>\n<\u002Ful>\n<h3 style=\"font-size:15px;margin:16px 0 6px\">5.1 \"Which node am I reading?\" — the escalation rule<\u002Fh3>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>The indicator escalates with how broken the spatial link is: tethered ⇒ nothing (the tail speaks) · pinned, node on-screen ⇒ accent halo · pinned, node off-screen ⇒ edge chip pointing at it (click flies home) · node on another board ⇒ origin label in the panel header (\"⌂ Northern Reach\"; click = cross-board flight, enters history).<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">6 · Tags<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li><b>Node-scoped, app-managed, project-wide, flat.<\u002Fb> Assigned many-to-many to nodes; never serialized into note text. Bare placed art is taggable — the flagship case. Flat and globally unique: <b>hierarchy is dropped<\u002Fb> (owner's call). Note-attached tags deferred, not rejected.<\u002Fli>\n  <li><b>Tag panel:<\u002Fb> search with tab-completion; thumbnail rows spanning every board, unplaced nodes included. Per row: <code>▤<\u002Fcode> open note · <code>⌖<\u002Fcode> fly to placement. <b>Lens<\u002Fb> <code>◎<\u002Fcode> toggle in the header dims the visible canvas to hits (~20% others), survives pan/zoom until dropped.<\u002Fli>\n  <li>Entry: <code>#<\u002Fcode> on the charm bar · <code>⌕<\u002Fcode> (typing # switches to tag mode) · tag chips anywhere. One destination, one row grammar.<\u002Fli>\n  <li>Multi-tag queries deferred; one tag at a time.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">7 · Global views and the library (RFC §14.4)<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li><b>Two scopes, two physics:<\u002Fb> node-local content floats as panels; project-global views take over the window. Esc or the charm returns; the camera is untouched. <b>Three charms, one house:<\u002Fb> ⊛ graph · ▤ outline · ⊞ gallery are projections of one database — the takeover has a top mode switcher; enter anywhere, hop freely.<\u002Fli>\n  <li><b>Graph ⊛:<\u002Fb> force layout; wiki-links are the only edges. Placed art renders as the art past a screen-size threshold; pure notes are dots; orphans (node, no note — can't have edges) wear a dashed ring + <code>⚯<\u002Fcode>. Filters: hide content-less · orphans only · #tag. Click ⇒ fly to placement (or open note if unplaced).<\u002Fli>\n  <li><b>Outline ▤:<\u002Fb> the world as an indented tree, same glyphs; cycles render as <code>↺<\u002Fcode> alias rows; unplaced notes gather in a root loose bin. Same filter chips.<\u002Fli>\n  <li><b>Gallery ⊞:<\u002Fb> the browsable collection — virtualized thumbnail grid; facets: sort (date/name/size) · tag filter · untagged · unplaced. Bulk select ⇒ floating action bar (tag · place · trash). Bulk import runs as an interruptible progress strip with live hash-dedupe count, never modal. <b>\"Library\" names the project kind; \"gallery\" names the view<\u002Fb> — any project can open its gallery.<\u002Fli>\n  <li><b>Sourcing:<\u002Fb> project charm menu rows offer <b>switch<\u002Fb> and <b>open as source<\u002Fb>. A source opens read-only as a <b>pinned panel<\u002Fb> (compressed gallery); dragging out copies bytes in, hash-deduped. The none/all/pick <b>tag-border toggle is session-scoped in the source panel header<\u002Fb> — never per-drag. Defaults: all from a library, none from a world.<\u002Fli>\n  <li><b>Seeded first-open:<\u002Fb> ordinary records — a root board of public-domain artists diving to per-artist boards with placed, tagged, noted works. The explainer is an ordinary pinned note whose one power is \"clear the example\" (an ordinary trash command over the example + itself). The tutorial is the app's own furniture.<\u002Fli>\n  <li><b>Mirror moments:<\u002Fb> (1) once-per-project ask rides the first drop, anchored to it, import never blocked, answer stored (settings line). (2) Hash-recognized drops get a transient chip offering the library's tags — it obeys the engagement fade (ignoring = dismissing); bulk drops collapse to one summary chip.<\u002Fli>\n  <li><b>Export<\u002Fb> (escape hatch): a sheet anchored to ☰. Three sections mirror the record kinds — notes → Markdown (+ optional uses appendix with <code>![[…]]<\u002Fcode>) · files → bytes + tag manifest (+ opt-in tag folders) · boards → full-res renders. Size is a live footer fact; past threshold, one acknowledge per project, never a gate.<\u002Fli>\n  <li><b>Figma-style frames: rejected<\u002Fb> (revisit clause stands). Proximity, tags, and nested canvases cover grouping.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">8 · Status<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Transitions ⇒ toasts (enter + resolve). <b>Ongoing conditions ⇒ a ⚠ charm appended below the rail<\u002Fb> — exists only while the condition holds, pulses once on arrival, click opens a detail panel anchored to it. Multiple conditions: one charm with a count. The status strip retires when this ships.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">9 · Theming and settings<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>Themes: dark (default) · light · glass (Mac-only, falls back dark). Grid: lines · dots · none. Optional flat canvas colors (porcelain / putty / slate / ink). Tokens as CSS custom properties; no theme engine.<\u002Fli>\n  <li>Settings is a <b>translucent takeover<\u002Fb> (~82% opaque, inset) — appearance changes apply live to the board visible behind it. No apply/save; commit on click; Esc closes.<\u002Fli>\n  <li>Inventory: <b>Appearance<\u002Fb> theme · grid · flat color · opacity — <b>Behavior<\u002Fb> charm corner · chrome-fade delay/never · snap-to-grid · mirror drops to library (per-project) — <b>Window<\u002Fb> title strip hover/always/never · border · rounded corners — <b>(Win/Linux)<\u002Fb> menu in rail vs system bar. Exhaustible in one glance, on purpose.<\u002Fli>\n  <li><b>Tooltips:<\u002Fb> every control shows name + shortcut, ~500ms delay, one chip style app-wide. The GUI is the tutorial for the keyboard app.<\u002Fli>\n<\u002Ful>\n\n<h2 style=\"font-size:18px;margin:28px 0 8px\">10 · Deferred ledger<\u002Fh2>\n<ul style=\"font-size:14.5px;line-height:1.65;margin:0 0 10px;padding-left:22px\">\n  <li>multi-tag queries (AND/OR) · note-attached tags · tag hierarchy (dropped hard) · switcher HUD · New Window / side-by-side · gallery keyboard model · OS-drop importer dialogue · grouping frames (rejected-for-now).<\u002Fli>\n<\u002Ful>\n\n<p style=\"font-size:12.5px;color:#888;margin:26px 0 0;border-top:1px solid #ddd;padding-top:10px\">Companion artifacts: <i>Shell Wireframes<\u002Fi> (decision trail, turns 1–14) · <i>Expanding Worlds — UI Vision<\u002Fi> (five hero states, themeable) · <i>How It Works<\u002Fi> (plain-language storyboard). Supersedes Design Spec v1 and reply letters 1–2.<\u002Fp>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
